<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 쓰기 - 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="write-container">
        <div class="write-box">
            <h2 style="margin:0;">📝 카페 글쓰기</h2>
            
            <input id="nickname" class="input-field" type="text" placeholder="닉네임 (주인장 인증: 이름#master123)">
            
            <div id="noticeArea" class="notice-check-area">
                <input type="checkbox" id="isNotice" style="width:20px; height:20px; cursor:pointer;">
                <label for="isNotice" style="cursor:pointer;">이 글을 공지사항으로 등록</label>
            </div>

            <div style="margin: 5px 0;">
                <label class="file-label" for="imageInput">📷 이미지 추가</label>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
                <div id="preview" style="margin-top:15px;"></div>
            </div>

            <textarea id="content" class="input-field" placeholder="내용을 입력하세요..."></textarea>
            
            <div style="display:flex; gap:12px; justify-content: flex-end;">
                <button onclick="location.href='/'" style="padding:15px 30px; border-radius:8px; cursor:pointer; background:#4f545c; color:white; border:none; font-weight:bold;">취소</button>
                <button onclick="send()" style="padding:15px 50px; border-radius:8px; cursor:pointer; background:var(--naver-green); color:white; border:none; font-weight:bold; font-size:16px;">등록하기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";

        window.onload = () => {
            const savedNick = localStorage.getItem('userNickname') || "";
            document.getElementById('nickname').value = savedNick;
            
            // 역할 확인 (주인장/점원 체크)
            socket.on('update_role_list', roles => {
                const myRole = roles[savedNick.split('#')[0]];
                if(myRole === '주인장' || myRole === '점원') {
                    document.getElementById('noticeArea').style.display = 'flex';
                }
            });
        };

        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (ev) => {
                    b64 = ev.target.result;
                    document.getElementById('preview').innerHTML = `<img src="${b64}" style="max-width:100%; border-radius:8px; border:1px solid #444;">`;
                };
                reader.readAsDataURL(file);
            }
        };

        function send() {
            const nick = document.getElementById('nickname').value || '익명';
            const msg = document.getElementById('content').value;
            const isNotice = document.getElementById('isNotice').checked;

            if(!msg && !b64) return alert("내용을 입력하세요.");

            if (confirm(isNotice ? "중요 공지사항으로 등록하시겠습니까?" : "글을 등록하시겠습니까?")) {
                localStorage.setItem('userNickname', nick);
                socket.emit('new_post', { nickname: nick, content: msg, image: b64, isNotice: isNotice });
                location.href = '/';
            }
        }
    </script>
</body>
</html>
