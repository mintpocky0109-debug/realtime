<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 글쓰기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: white;">
    <div style="max-width:800px; margin:0 auto; padding:40px 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:2px solid #333; padding-bottom:15px;">
            <h2 style="margin:0;">📝 카페 글쓰기</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#f3f4f6;" onclick="history.back()">취소</button>
                <button class="btn btn-green" onclick="send()">등록하기</button>
            </div>
        </div>

        <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin-bottom:25px; font-size:13px; color:#666;">
            💡 닉네임 뒤에 <b>#admin777</b>을 붙여서 첫 글을 쓰면 <b>주인장</b>으로 영구 임명됩니다.
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <div>
                <label style="font-size:13px; font-weight:bold; margin-bottom:5px; display:block;">게시판 선택</label>
                <select id="boardSelect" class="input-style"></select>
            </div>
            <div>
                <label style="font-size:13px; font-weight:bold; margin-bottom:5px; display:block;">닉네임 설정</label>
                <input id="nickname" type="text" placeholder="닉네임을 입력하세요" class="input-style">
            </div>
        </div>

        <textarea id="content" placeholder="이곳에 내용을 입력하세요. 따뜻한 커뮤니티를 위해 고운 말을 사용해 주세요." class="input-style" style="height:450px; resize:none; line-height:1.8;"></textarea>
        
        <div style="margin-top:20px; padding:20px; border:2px dashed #e5e7eb; border-radius:12px; text-align:center;">
            <input type="file" id="imgIn" style="display:none;" accept="image/*">
            <button class="btn" style="background:#fff; border:1px solid #ddd;" onclick="document.getElementById('imgIn').click()">📷 사진 첨부하기</button>
            <div id="preview" style="margin-top:15px; display:flex; justify-content:center;"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";

        socket.on('load_all', data => {
            document.getElementById('boardSelect').innerHTML = data.config.boards.map(b => `<option value="${b}">${b}</option>`).join('');
            document.getElementById('nickname').value = localStorage.getItem('userNickname') || "";
        });

        document.getElementById('imgIn').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                b64 = ev.target.result;
                document.getElementById('preview').innerHTML = `<div style="position:relative;"><img src="${b64}" style="max-width:300px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);"><div onclick="removeImg()" style="position:absolute; top:-10px; right:-10px; background:red; color:white; border-radius:50%; width:25px; height:25px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold;">✕</div></div>`;
            };
            reader.readAsDataURL(file);
        };

        function removeImg() { b64 = ""; document.getElementById('preview').innerHTML = ""; }

        function send() {
            const board = document.getElementById('boardSelect').value;
            const nick = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();
            if(!nick || !content) return alert("닉네임과 내용을 모두 입력해 주세요.");
            
            localStorage.setItem('userNickname', nick.replace('#admin777', ''));
            socket.emit('new_post', { board, nickname: nick, content, image: b64 });
            setTimeout(() => location.href = '/', 300);
        }
    </script>
</body>
</html>
