<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#fff; padding:20px;">
    <div style="max-width:600px; margin:0 auto;">
        <h2>📝 새 글 작성</h2>
        <p style="font-size:12px; color:#888;">주인장 등록은 닉네임 뒤에 <b>#admin777</b>을 붙이세요.</p>
        <select id="boardSelect" class="input-style"></select>
        <input id="nickname" type="text" placeholder="닉네임" class="input-style">
        <textarea id="content" placeholder="카페 운영 원칙을 준수해주세요." class="input-style" style="height:250px; resize:none;"></textarea>
        
        <div style="margin:15px 0;">
            <input type="file" id="imgIn">
            <div id="preview"></div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn" style="flex:1;" onclick="history.back()">취소</button>
            <button class="btn btn-green" style="flex:2;" onclick="send()">등록</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";

        socket.on('load_all', data => {
            document.getElementById('boardSelect').innerHTML = data.config.boards.map(b => `<option value="${b}">${b}</option>`).join('');
        });

        document.getElementById('imgIn').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                b64 = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${b64}" style="width:100px; margin-top:10px;">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function send() {
            const board = document.getElementById('boardSelect').value;
            const nick = document.getElementById('nickname').value;
            const content = document.getElementById('content').value;
            if(!nick || !content) return alert("모두 입력해주세요.");
            
            localStorage.setItem('userNickname', nick.replace('#admin777', ''));
            socket.emit('new_post', { board, nickname: nick, content, image: b64 });
            setTimeout(() => location.href = '/', 200);
        }
    </script>
</body>
</html>
