<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 작성</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="write-box">
        <h3>📝 새 게시글 작성</h3>
        <input id="nickname" class="input-field" type="text" placeholder="닉네임">
        
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <label for="imageInput" style="cursor:pointer; color:var(--accent-blue);">📷 사진 첨부하기</label>
        <div id="preview" style="margin-top:10px;"></div>

        <textarea id="content" class="input-field" placeholder="내용을 입력하세요..."></textarea>
        
        <div style="display:flex; gap:10px;">
            <button onclick="location.href='/'" style="flex:1; padding:15px; border-radius:8px; cursor:pointer; background:#4f545c; color:white; border:none;">취소</button>
            <button onclick="send()" style="flex:2; padding:15px; border-radius:8px; cursor:pointer; background:var(--naver-green); color:white; border:none; font-weight:bold;">게시하기</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";

        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = (ev) => {
                    b64 = ev.target.result;
                    document.getElementById('preview').innerHTML = `<img src="${b64}" style="max-width:100px; border-radius:5px;">`;
                };
                reader.readAsDataURL(file);
            }
        };

        function send() {
            const nick = document.getElementById('nickname').value || '익명';
            const msg = document.getElementById('content').value;
            if(msg || b64) {
                socket.emit('new_post', { nickname: nick, content: msg, image: b64 });
                alert("게시되었습니다!");
                location.href = '/';
            }
        }
    </script>
</body>
</html>
