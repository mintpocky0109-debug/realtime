<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글 쓰기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:var(--bg-card);">
    <div class="write-layout">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="location.href='/'" style="background:none; border:none; color:white; font-size:20px;">✕</button>
            <button onclick="send()" class="btn btn-main">등록</button>
        </div>

        <input id="nickname" type="text" placeholder="닉네임" style="background:none; border:none; border-bottom:1px solid #444; color:white; padding:10px; font-size:18px; outline:none;">

        <div class="input-area">
            <textarea id="content" placeholder="무슨 생각을 하고 계신가요? (Ctrl+Enter로 등록)"></textarea>
            <div class="image-preview-slot" id="preview" onclick="document.getElementById('imgIn').click()">
                <span id="plus">+</span>
            </div>
        </div>
        
        <input type="file" id="imgIn" accept="image/*" style="display:none;">
        <p style="font-size:12px; color:#888; text-align:center;">엔터는 줄바꿈, 컨트롤+엔터는 바로 등록됩니다.</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";

        document.getElementById('nickname').value = localStorage.getItem('userNickname') || "";

        // 엔터키 처리
        document.getElementById('content').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                send();
            }
        });

        document.getElementById('imgIn').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                b64 = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${b64}">`;
            };
            reader.readAsDataURL(file);
        };

        function send() {
            const n = document.getElementById('nickname').value;
            const c = document.getElementById('content').value;
            if(!n || !c) return alert("내용을 입력해주세요.");
            localStorage.setItem('userNickname', n);
            socket.emit('new_post', { nickname: n, content: c, image: b64 });
            location.href = '/';
        }
    </script>
</body>
</html>
