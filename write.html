<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 글쓰기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: white; padding:40px 20px;">
    <div style="max-width:800px; margin:0 auto;">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h2 style="margin:0;">📝 게시글 작성</h2>
            <button class="btn btn-green" onclick="send()">등록하기</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <select id="boardSelect" class="input-style" style="margin:0;"></select>
            <input id="nickname" type="text" placeholder="닉네임" class="input-style" style="margin:0;">
        </div>
        <textarea id="content" placeholder="내용을 입력하세요." class="input-style" style="height:400px; resize:none;"></textarea>
        <div style="border:2px dashed #ddd; padding:20px; text-align:center; border-radius:12px;">
            <input type="file" id="imgIn" style="display:none;" accept="image/*">
            <button class="btn" style="background:#f0f0f0;" onclick="document.getElementById('imgIn').click()">📷 사진 추가</button>
            <div id="preview" style="margin-top:15px;"></div>
        </div>
        <button class="btn" style="width:100%; margin-top:20px; background:#eee;" onclick="history.back()">취소</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let b64 = "";
        socket.on('load_all', data => {
            document.getElementById('boardSelect').innerHTML = data.config.boards.map(b => `<option value="${b}">${b}</option>`).join('');
            document.getElementById('nickname').value = localStorage.getItem('userNickname') || "";
        });
        document.getElementById('imgIn').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                b64 = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${b64}" style="max-width:200px; border-radius:8px;">`;
            };
            reader.readAsDataURL(file);
        };
        function send() {
            const nick = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();
            if(!nick || !content) return alert("내용을 입력해주세요.");
            localStorage.setItem('userNickname', nick.replace('#admin777', ''));
            socket.emit('new_post', { board: document.getElementById('boardSelect').value, nickname: nick, content, image: b64 });
            setTimeout(() => location.href = '/', 300);
        }
    </script>
</body>
</html>
