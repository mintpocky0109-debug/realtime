<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .badge-owner { color: #ff9800; font-weight: bold; }
        .badge-staff { color: #2db400; font-weight: bold; }
        .user-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-small { padding: 4px 8px; font-size: 11px; margin-left: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">카페 에스프레소</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:20px; border-top:1px solid #eee; display:none; padding-top:20px;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 글쓰기</button>
                <button class="btn" id="mgmtBtn" style="width:100%; margin-top:8px; display:none;" onclick="openSettings(true)">⚙️ 카페 관리</button>
                <button class="btn" id="editBtn" style="width:100%; margin-top:8px;" onclick="openSettings(false)">👤 정보 수정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <h2 id="currentBoardTitle" style="padding:25px 25px 0 25px; margin:0;">전체보기</h2>
                <div id="postList"></div>
            </div>
            <div id="postDetailView" style="display:none; padding:30px;">
                <div onclick="closePost()" style="cursor:pointer; color:#888; margin-bottom:20px;">← 목록으로 돌아가기</div>
                <div id="postDetailBody"></div>
            </div>
        </section>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:450px; border-radius:20px; padding:25px; max-height: 80vh; overflow-y: auto;">
            <div style="display:flex; border-bottom:1px solid #eee; margin-bottom:20px;">
                <div id="tab0" class="s-tab active" style="padding:10px; cursor:pointer;" onclick="showSTab(0)">내 정보 수정</div>
                <div id="tab1" class="s-tab" style="padding:10px; cursor:pointer; display:none;" onclick="showSTab(1)">회원 관리</div>
            </div>
            
            <div id="st-0" class="st-content">
                <div id="bgP" style="width:100%; height:110px; border-radius:10px; background:#eee center/cover; cursor:pointer;" onclick="document.getElementById('bgF').click()"></div>
                <img id="pfP" style="width:70px; height:70px; border-radius:50%; border:3px solid white; margin-top:-35px; margin-left:15px; object-fit:cover;" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                <input type="text" id="setNick" placeholder="닉네임" class="input-style" style="margin-top:15px;">
                <textarea id="setDesc" placeholder="소개글" class="input-style" style="height:80px;"></textarea>
                <button class="btn btn-green" style="width:100%; padding:15px;" onclick="saveProfile()">저장하기</button>
            </div>
            
            <div id="st-1" class="st-content" style="display:none;">
                <div id="userListArea"></div>
            </div>
            <button class="btn" style="width:100%; margin-top:15px; background:#eee;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:320px; border-radius:20px; padding:30px;">
            <div style="display:flex; margin-bottom:20px;">
                <div id="lTabL" class="s-tab active" style="flex:1; text-align:center; cursor:pointer;" onclick="switchLTab('L')">로그인</div>
                <div id="lTabS" class="s-tab" style="flex:1; text-align:center; cursor:pointer;" onclick="switchLTab('S')">회원가입</div>
            </div>
            <input type="text" id="uId" placeholder="아이디" class="input-style">
            <input type="password" id="uPw" placeholder="비밀번호" class="input-style">
            <input type="text" id="uNi" placeholder="닉네임" class="input-style" style="display:none;">
            <button id="authBtn" class="btn btn-green" style="width:100%;" onclick="auth()">로그인</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let authMode = 'L';

        socket.on('load_all', d => { 
            allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; 
            if(currentUser) {
                const me = allUsers.find(u => u.userId === currentUser.userId);
                if(me) { currentUser = me; localStorage.setItem('cafeUser', JSON.stringify(me)); }
            }
            renderAll(); 
        });

        function renderAll() {
            updateAuthUI();
            renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                const badge = currentUser.role === '주인장' ? '👑 ' : (currentUser.role === '점원' ? '⭐ ' : '');
                h.innerHTML = `<span>${badge}<b>${currentUser.nickname}</b>님</span> <button class="btn" onclick="logout()" style="padding:4px 8px; font-size:12px;">로그아웃</button>`;
                document.getElementById('sideMenu').style.display = 'block';
                document.getElementById('mgmtBtn').style.display = (currentUser.role === '주인장' || currentUser.role === '점원') ? 'block' : 'none';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function switchLTab(m) {
            authMode = m;
            document.getElementById('uNi').style.display = m === 'S' ? 'block' : 'none';
            document.getElementById('authBtn').innerText = m === 'L' ? '로그인' : '회원가입';
        }

        async function auth() {
            const userId = document.getElementById('uId').value;
            const password = document.getElementById('uPw').value;
            const nickname = document.getElementById('uNi').value;
            const res = await fetch(authMode === 'L' ? '/api/login' : '/api/signup', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password, nickname })
            });
            const d = await res.json();
            if(d.success) {
                if(authMode === 'L') { localStorage.setItem('cafeUser', JSON.stringify(d.user)); location.reload(); }
                else { alert("가입 완료! 로그인하세요."); switchLTab('L'); }
            } else alert(d.message);
        }

        function openSettings(isAdmin) {
            document.getElementById('setNick').value = currentUser.nickname;
            document.getElementById('setDesc').value = currentUser.profileDesc || "";
            document.getElementById('bgP').style.backgroundImage = currentUser.bgImg ? `url(${currentUser.bgImg})` : 'none';
            document.getElementById('pfP').src = currentUser.profileImg || '';
            
            document.getElementById('tab1').style.display = (currentUser.role === '주인장' || currentUser.role === '점원') ? 'block' : 'none';
            showSTab(isAdmin ? 1 : 0);
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function showSTab(idx) {
            document.querySelectorAll('.st-content').forEach((c, i) => c.style.display = i === idx ? 'block' : 'none');
            if(idx === 1) renderUserManagement();
        }

        function renderUserManagement() {
            const area = document.getElementById('userListArea');
            area.innerHTML = `<h4>회원 목록 (${allUsers.length})</h4>` + allUsers.map(u => {
                const isStaff = cafeConfig.staffList.includes(u.userId);
                const roleBadge = u.role === '주인장' ? '👑' : (isStaff ? '⭐' : '👤');
                return `
                    <div class="user-card">
                        <div>${roleBadge} <b>${u.nickname}</b> <small>(${u.userId})</small></div>
                        <div>
                            ${currentUser.role === '주인장' && u.userId !== 'Mint_pocky' ? `
                                <button class="btn btn-small" onclick="manageUser('${u.userId}', '${isStaff ? 'demote' : 'promote'}')">${isStaff ? '점원해제' : '점원고용'}</button>
                            ` : ''}
                            ${u.userId !== 'Mint_pocky' && u.userId !== currentUser.userId ? `
                                <button class="btn btn-small" style="background:#ff4d4d; color:white;" onclick="manageUser('${u.userId}', 'kick')">강퇴</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function manageUser(targetId, action) {
            if(!confirm("진행하시겠습니까?")) return;
            const res = await fetch('/api/admin/manage-user', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId: currentUser.userId, targetId, action })
            });
            const d = await res.json();
            if(d.success) { alert("완료되었습니다."); location.reload(); } else alert(d.message);
        }

        async function saveProfile() {
            const bgDiv = document.getElementById('bgP').style.backgroundImage;
            const payload = {
                userId: currentUser.userId,
                nickname: document.getElementById('setNick').value,
                profileDesc: document.getElementById('setDesc').value,
                profileImg: document.getElementById('pfP').src,
                bgImg: bgDiv && bgDiv !== 'none' ? bgDiv.slice(5, -2).replace(/"/g, "") : ""
            };
            const res = await fetch('/api/update-profile', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const d = await res.json();
            if(d.success) { alert("수정되었습니다."); location.reload(); }
        }

        function renderPosts() {
            document.getElementById('postList').innerHTML = allPosts.map(p => {
                const u = allUsers.find(x => x.nickname === p.nickname);
                const badge = u?.userId === 'Mint_pocky' ? '👑' : (cafeConfig.staffList.includes(u?.userId) ? '⭐' : '');
                return `<div class="post-list-item" onclick="openPost(${p.id})">
                    <b>${p.content.substring(0,30)}</b><br>
                    <small>${badge} ${p.nickname}</small>
                </div>`;
            }).join('');
        }

        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function pvImg(input, targetId) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    if(targetId === 'bgP') document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`;
                    else document.getElementById(targetId).src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
