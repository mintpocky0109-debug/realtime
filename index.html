<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings-icon" onclick="toggleSettings()">⚙️</div>

    <div class="cafe-header">
        <h1 onclick="location.href='/'">🚀 우리들의 비밀 커뮤니티</h1>
    </div>

    <div class="notice-banner">
        <strong>📢 공지:</strong> 즐거운 커뮤니티를 위해 서로를 배려해 주세요.
    </div>

    <div class="control-bar">
        <button class="btn-write" onclick="location.href='/write'">📝 글쓰기</button>
    </div>

    <div id="board"></div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>🛠️ 유저 역할 설정</h3>
            <input id="targetNick" class="input-field" type="text" placeholder="대상 닉네임">
            <select id="roleSelect" class="input-field">
                <option value="멤버">멤버</option>
                <option value="점원">☕ 점원</option>
                <option value="주인장">👑 주인장</option>
            </select>
            <button onclick="applyRole()" style="background:var(--naver-green); color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">적용하기</button>
            <button onclick="toggleSettings()" style="background:#555; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer;">닫기</button>
        </div>
    </div>

    <footer>
        <p>© 2026 우리 커뮤니티. All rights reserved.</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function applyRole() {
            const nick = document.getElementById('targetNick').value;
            const role = document.getElementById('roleSelect').value;
            if(!nick) return alert("닉네임을 입력하세요");
            socket.emit('change_role', { targetNick: nick, newRole: role });
            alert(nick + "님 설정 완료!");
            toggleSettings();
        }

        socket.on('load_history', (history) => {
            board.innerHTML = '';
            history.forEach(data => renderPost(data));
        });

        socket.on('show_post', (data) => renderPost(data));

        function renderPost(data) {
            const post = document.createElement('div');
            post.className = 'post';
            const imgHtml = data.image ? `<img class="post-image" src="${data.image}">` : "";
            
            let badge = "";
            let color = "";
            if(data.role === '주인장') { badge = `<span class="badge-admin">👑 주인장</span>`; color = "color: #ffcc00;"; }
            else if(data.role === '점원') { badge = `<span class="badge-staff">☕ 점원</span>`; color = "color: #00ffcc;"; }

            post.innerHTML = `
                <div class="post-header">
                    <div><span class="post-nickname" style="${color}">${data.nickname}</span>${badge}</div>
                    <span style="font-size:12px; color:#888;">${data.time}</span>
                </div>
                <div class="post-content">${data.content}</div>
                ${imgHtml}
            `;
            board.prepend(post);
        }
    </script>
</body>
</html>
