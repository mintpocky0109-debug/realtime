<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cafe-header">
        <h1 onclick="location.href='/'">🚀 우리들의 비밀 커뮤니티</h1>
    </div>

    <div class="notice-banner">
        <strong>📢 공지사항:</strong> 관리자 닉네임은 보호받으며, 즐거운 소통 문화를 지향합니다.
    </div>

    <div class="control-bar">
        <button class="btn-write" onclick="location.href='/write'">📝 글쓰기</button>
    </div>

    <div id="board"></div>

    <footer>
        <p>© 2026 우리 커뮤니티. All rights reserved.</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');

        socket.on('load_history', (history) => {
            board.innerHTML = '';
            history.forEach(data => renderPost(data));
        });

        socket.on('show_post', (data) => renderPost(data));

        function renderPost(data) {
            const post = document.createElement('div');
            post.className = 'post';
            const imgHtml = data.image ? `<img class="post-image" src="${data.image}">` : "";
            
            // 역할이 관리자일 경우 배지 추가
            const roleBadge = data.role === '관리자' ? `<span class="badge-admin">관리자</span>` : "";

            post.innerHTML = `
                <div class="post-header">
                    <div>
                        <span class="post-nickname">${data.nickname}</span>
                        ${roleBadge}
                    </div>
                    <span class="post-time">${data.time}</span>
                </div>
                <div class="post-content">${data.content}</div>
                ${imgHtml}
            `;
            board.prepend(post);
        }
    </script>
</body>
</html>
