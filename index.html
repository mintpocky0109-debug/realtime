<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☕ 카페 에스프레소</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">Cafe Espresso</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:25px; border-top:1px solid #eee; display:none; padding-top:25px;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 새 글 작성하기</button>
                <button class="btn" style="width:100%; margin-top:10px; background:#f8f9fa; color:#666;" onclick="openSettings()">⚙️ 카페 설정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <div style="padding:30px 35px; border-bottom:2px solid #f8f9fa; display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="currentBoardTitle" style="margin:0; font-size:22px; color:#1a1a1a;">전체보기</h2>
                    <span style="font-size:13px; color:#aaa;">오늘의 새로운 소식</span>
                </div>
                <div id="postList"></div>
            </div>

            <div id="postDetailView" style="display:none; padding:40px;">
                <div onclick="closePost()" style="cursor:pointer; color:var(--primary-color); font-weight:700; margin-bottom:30px; display:inline-block;">← 목록으로 돌아가기</div>
                <div id="postDetailBody"></div>
                <div id="postImgArea"></div>
                <div id="likeArea" style="margin-top:40px; padding-top:20px; border-top:1px solid #eee;"></div>
            </div>
        </section>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:360px; border-radius:30px; padding:40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
            <div style="text-align:center; margin-bottom:30px;">
                <h2 id="authTitle" style="margin:0; font-size:24px;">Welcome!</h2>
                <p id="authSubTitle" style="color:#888; margin-top:10px; font-size:14px;">카페 에스프레소의 멤버가 되어보세요.</p>
            </div>
            <div style="display:flex; margin-bottom:25px; background: #f0f2f0; padding: 6px; border-radius: 15px;">
                <div id="lTabL" class="s-tab active" style="flex:1; text-align:center; cursor:pointer; padding:10px; border-radius:12px;" onclick="switchLTab('L')">로그인</div>
                <div id="lTabS" class="s-tab" style="flex:1; text-align:center; cursor:pointer; padding:10px; border-radius:12px;" onclick="switchLTab('S')">회원가입</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div>
                    <label style="font-size:12px; font-weight:700; color:#555; margin-left:5px;">아이디</label>
                    <input type="text" id="uId" placeholder="ID" class="input-style">
                </div>
                <div>
                    <label style="font-size:12px; font-weight:700; color:#555; margin-left:5px;">비밀번호</label>
                    <input type="password" id="uPw" placeholder="Password" class="input-style">
                </div>
                <div id="nickGroup" style="display:none;">
                    <label style="font-size:12px; font-weight:700; color:#555; margin-left:5px;">닉네임</label>
                    <input type="text" id="uNi" placeholder="Nickname" class="input-style">
                </div>
                <button id="authBtn" class="btn btn-green" style="margin-top:10px; padding:16px;" onclick="auth()">로그인하기</button>
                <button class="btn" style="background:#eee; margin-top:5px;" onclick="document.getElementById('loginModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:480px; border-radius:30px; padding:35px; max-height: 85vh; overflow-y: auto;">
            <div style="display:flex; gap:10px; border-bottom:1px solid #f0f0f0; margin-bottom:25px;">
                <div id="tab0" class="s-tab active" style="padding:10px 20px; cursor:pointer;" onclick="showSTab(0)">프로필 관리</div>
                <div id="tab1" class="s-tab" style="padding:10px 20px; cursor:pointer; display:none;" onclick="showSTab(1)">멤버 관리</div>
            </div>
            <div id="st-0" class="st-content">
                <div id="bgP" style="width:100%; height:130px; border-radius:15px; background:#f8f9fa center/cover; cursor:pointer; display:flex; align-items:center; justify-content:center; border:2px dashed #ddd; color:#aaa; font-size:14px;" onclick="document.getElementById('bgF').click()">배너 배경 업로드</div>
                <img id="pfP" style="width:80px; height:80px; border-radius:50%; border:4px solid white; margin-top:-40px; margin-left:20px; object-fit:cover; background:#eee; box-shadow:0 5px 15px rgba(0,0,0,0.1);" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="setNick" placeholder="사용할 닉네임" class="input-style">
                    <textarea id="setDesc" placeholder="당신을 소개해 주세요." class="input-style" style="height:100px; resize:none;"></textarea>
                    <button class="btn btn-green" style="width:100%;" onclick="saveProfile()">저장하기</button>
                </div>
            </div>
            <div id="st-1" class="st-content" style="display:none;">
                <div id="userListArea" style="min-height:350px;"></div>
            </div>
            <button class="btn" style="width:100%; margin-top:20px; background:#f1f1f1;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="profileModal" class="modal" onclick="this.style.display='none'">
        <div style="background:white; width:360px; border-radius:30px; overflow:hidden;" onclick="event.stopPropagation()">
            <div id="p-bg" style="height:120px; background-color:var(--accent-color); background-position:center; background-size:cover;"></div>
            <div style="padding:30px; text-align:center;">
                <img id="p-img" style="width:100px; height:100px; border-radius:50%; border:5px solid white; margin-top:-70px; background:white; object-fit:cover;">
                <h3 id="p-nick" style="margin:15px 0 5px; font-size:20px;"></h3>
                <p id="p-desc" style="color:#7f8c8d; font-size:14px; margin-bottom:25px;"></p>
                <button class="btn btn-green" style="width:100%;" onclick="document.getElementById('profileModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const DEFAULT_PF = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23DBDBDB'%3E%3Crect width='24' height='24' fill='%23F0F0F0'/%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let authMode = 'L', currentBoard = '전체보기', currentPostId = null;

        socket.on('load_all', d => { 
            allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; 
            if(currentUser) {
                const me = allUsers.find(u => u.userId === currentUser.userId);
                if(me) { currentUser = me; localStorage.setItem('cafeUser', JSON.stringify(me)); }
            }
            renderAll(); 
            if(currentPostId) renderPostDetail(currentPostId);
        });

        socket.on('update_posts', p => { allPosts = p; renderPosts(); if(currentPostId) renderPostDetail(currentPostId); });
        socket.on('update_users', u => { allUsers = u; updateAuthUI(); });

        function renderAll() {
            document.getElementById('boardList').innerHTML = `<div class="board-item ${currentBoard==='전체보기'?'active':''}" onclick="filterBoard('전체보기')">📋 전체보기</div>` + 
                cafeConfig.boards.map(b => `<div class="board-item ${currentBoard===b?'active':''}" onclick="filterBoard('${b}')">📋 ${b}</div>`).join('');
            updateAuthUI();
            renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                const badge = currentUser.role === '주인장' ? '👑 ' : (currentUser.role === '점원' ? '⭐ ' : '');
                h.innerHTML = `<span onclick="showProfileById('${currentUser.userId}')" style="cursor:pointer; font-weight:700;">${badge}${currentUser.nickname}</span> <button class="btn" onclick="logout()" style="padding:6px 12px; font-size:12px; margin-left:15px; background:#fefefe; border:1px solid #eee;">로그아웃</button>`;
                document.getElementById('sideMenu').style.display = 'block';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function filterBoard(name) { currentBoard = name; document.getElementById('currentBoardTitle').innerText = name; renderAll(); closePost(); }

        function renderPosts() {
            let filtered = currentBoard === '전체보기' ? allPosts : allPosts.filter(p => p.board === currentBoard);
            document.getElementById('postList').innerHTML = filtered.map(p => {
                const u = allUsers.find(x => x.nickname === p.nickname);
                const badge = u?.role === '주인장' ? '👑' : (u?.role === '점원' ? '⭐' : '');
                const photoIcon = (p.image && p.image !== "") ? '<span style="font-size:12px; margin-left:5px;">🖼️</span>' : '';
                return `
                    <div class="post-list-item" onclick="openPost(${p.id})">
                        <div style="font-weight:700; font-size:18px; color:#2c3e50; margin-bottom:8px;">${p.content.substring(0,38)}${p.content.length>38?'...':''}${photoIcon}</div>
                        <div style="display:flex; align-items:center; font-size:13px; color:#95a5a6;">
                            <span style="color:var(--primary-color); font-weight:700;">${badge}${p.nickname}</span>
                            <span style="margin:0 10px; opacity:0.3;">|</span>
                            <span>${p.time.split(',')[0]}</span>
                        </div>
                    </div>`;
            }).join('') || '<div style="padding:100px; text-align:center; color:#ccc;">비어있는 게시판입니다.</div>';
        }

        function openPost(id) {
            currentPostId = id;
            renderPostDetail(id);
            document.getElementById('listView').style.display = 'none';
            document.getElementById('postDetailView').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function renderPostDetail(id) {
            const p = allPosts.find(x => x.id === id); if(!p) return;
            document.getElementById('postDetailBody').innerHTML = `
                <h2 style="margin-bottom:10px;">${p.nickname}님의 기록</h2>
                <div style="font-size:13px; color:#aaa; margin-bottom:30px;">${p.time}</div>
                <p style="white-space:pre-wrap; font-size:16px; line-height:1.8; color:#444;">${p.content}</p>`;
            document.getElementById('postImgArea').innerHTML = (p.image && p.image !== "") ? `<img src="${p.image}" style="max-width:100%; border-radius:15px; margin-top:25px; box-shadow:0 10px 20px rgba(0,0,0,0.05);">` : "";
            const isLiked = currentUser && p.likedBy && p.likedBy.includes(currentUser.userId);
            document.getElementById('likeArea').innerHTML = `
                <button class="btn ${isLiked?'btn-green':''}" onclick="toggleLike(${p.id})" style="display:flex; align-items:center; gap:8px; padding:15px 30px;">
                    ${isLiked?'☕':'🍵'} 커피 쏘기 <span style="opacity:0.8;">${p.likedBy?p.likedBy.length:0}</span>
                </button>`;
        }

        function toggleLike(postId) { if(!currentUser) return alert("로그인 후 이용 가능합니다."); socket.emit('toggle_like', { postId, userId: currentUser.userId }); }

        function showProfileById(uId) {
            const u = allUsers.find(x => x.userId === uId);
            if(!u) return alert("정보를 불러올 수 없습니다.");
            document.getElementById('p-bg').style.backgroundImage = u.bgImg ? `url(${u.bgImg})` : 'none';
            document.getElementById('p-img').src = u.profileImg || DEFAULT_PF;
            document.getElementById('p-nick').innerText = (u.role==='주인장'?'👑 ':(u.role==='점원'?'⭐ ':'')) + u.nickname;
            document.getElementById('p-desc').innerText = u.profileDesc || "소개가 없습니다.";
            document.getElementById('profileModal').style.display = 'flex';
        }

        function openSettings() {
            if(!currentUser) return;
            document.getElementById('setNick').value = currentUser.nickname;
            document.getElementById('setDesc').value = currentUser.profileDesc || "";
            document.getElementById('bgP').style.backgroundImage = currentUser.bgImg ? `url(${currentUser.bgImg})` : 'none';
            document.getElementById('bgP').innerText = currentUser.bgImg ? "" : "배너 배경 업로드";
            document.getElementById('pfP').src = currentUser.profileImg || DEFAULT_PF;
            document.getElementById('tab1').style.display = (currentUser.role === '주인장' || currentUser.role === '점원') ? 'block' : 'none';
            showSTab(0);
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function showSTab(idx) {
            document.querySelectorAll('.st-content').forEach((c, i) => c.style.display = i === idx ? 'block' : 'none');
            document.querySelectorAll('#settingsModal .s-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            if(idx === 1) renderUserManagement();
        }

        function renderUserManagement() {
            const area = document.getElementById('userListArea');
            area.innerHTML = allUsers.map(u => {
                const isS = cafeConfig.staffList.includes(u.userId);
                return `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #f9f9f9;">
                        <div>
                            <div style="font-weight:700;">${u.role==='주인장'?'👑':(isS?'⭐':'👤')} ${u.nickname}</div>
                            <div style="font-size:12px; color:#ccc;">${u.userId}</div>
                        </div>
                        <div>
                            ${currentUser.role==='주인장' && u.userId!=='Mint_pocky' ? `<button class="btn" style="padding:5px 10px; font-size:11px; background:#f0f0f0;" onclick="manageUser('${u.userId}','${isS?'demote':'promote'}')">${isS?'강등':'고용'}</button>`:''}
                            ${u.userId!=='Mint_pocky' && u.userId!==currentUser.userId ? `<button class="btn" style="padding:5px 10px; font-size:11px; background:#ffeded; color:#ff5e5e; margin-left:5px;" onclick="manageUser('${u.userId}','kick')">강퇴</button>`:''}
                        </div>
                    </div>`;
            }).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">멤버가 없습니다.</div>';
        }

        async function manageUser(targetId, action) {
            const res = await fetch('/api/admin/manage-user', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminId:currentUser.userId, targetId, action}) });
            if((await res.json()).success) { alert("처리되었습니다."); socket.emit('load_all'); }
        }

        async function saveProfile() {
            const bg = document.getElementById('bgP').style.backgroundImage;
            const res = await fetch('/api/update-profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
                userId:currentUser.userId, nickname:document.getElementById('setNick').value, profileDesc:document.getElementById('setDesc').value, profileImg:document.getElementById('pfP').src,
                bgImg: bg && bg!=='none' ? bg.slice(5,-2).replace(/"/g,"") : ""
            })});
            if((await res.json()).success) { alert("성공적으로 수정되었습니다!"); location.reload(); }
        }

        async function auth() {
            const id = document.getElementById('uId').value;
            const pw = document.getElementById('uPw').value;
            const ni = document.getElementById('uNi').value;
            const res = await fetch(authMode==='L'?'/api/login':'/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:id, password:pw, nickname:ni})});
            const d = await res.json();
            if(d.success) { 
                if(authMode==='L'){ localStorage.setItem('cafeUser', JSON.stringify(d.user)); location.reload(); } 
                else { alert("가입을 축하합니다! 이제 로그인해 주세요."); switchLTab('L'); }
            } else alert("정보를 다시 확인해 주세요.");
        }

        function switchLTab(m) { 
            authMode = m;
            const isL = m === 'L';
            document.getElementById('authTitle').innerText = isL ? "반가워요!" : "처음인가요?";
            document.getElementById('authSubTitle').innerText = isL ? "카페 에스프레소에 오신 걸 환영합니다." : "간단한 정보만으로 멤버가 될 수 있습니다.";
            document.getElementById('nickGroup').style.display = isL ? 'none' : 'block'; 
            document.getElementById('authBtn').innerText = isL ? '로그인하기' : '회원가입 완료';
            document.getElementById('lTabL').classList.toggle('active', isL);
            document.getElementById('lTabS').classList.toggle('active', !isL);
        }

        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function closePost() { currentPostId = null; document.getElementById('listView').style.display='block'; document.getElementById('postDetailView').style.display='none'; }
        function pvImg(i,t){ const f=i.files[0]; if(f){ const r=new FileReader(); r.onload=e=>{ 
            if(t==='bgP'){ document.getElementById(t).style.backgroundImage=`url(${e.target.result})`; document.getElementById(t).innerText=""; }
            else document.getElementById(t).src=e.target.result; 
        }; r.readAsDataURL(f); } }
    </script>
</body>
</html>
