<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cafe-header">
        <h1>🚀 우리들의 비밀 커뮤니티</h1>
        <p>자유롭게 소통하고 사진을 공유하는 공간입니다. (실시간 업데이트 중)</p>
    </div>

    <div class="control-bar">
        <button class="btn-write" onclick="location.href='/write'">📝 글쓰기</button>
    </div>

    <div id="board"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');

        socket.on('load_history', (history) => {
            board.innerHTML = '';
            history.forEach(data => renderPost(data));
        });

        socket.on('show_post', (data) => {
            renderPost(data);
        });

        function renderPost(data) {
            const post = document.createElement('div');
            post.className = 'post';
            const imgHtml = data.image ? `<img class="post-image" src="${data.image}">` : "";
            
            post.innerHTML = `
                <div class="post-header">
                    <span class="post-nickname">${data.nickname}</span>
                    <span class="post-time">${data.time}</span>
                </div>
                <div class="post-content">${data.content}</div>
                ${imgHtml}
            `;
            board.prepend(post);
        }
    </script>
</body>
</html>
