<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☕ 카페 에스프레소</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --naver-green: #03c75a; 
            --bg-gray: #f9f9f9; 
            --border-color: #eee; 
        }
        
        .board-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            table-layout: fixed; 
        }
        .board-table th { 
            padding: 12px 8px; 
            border-bottom: 1px solid #333; 
            font-size: 13px; 
            color: #666; 
            text-align: center; 
            background: #fff; 
        }
        .board-table td { 
            padding: 14px 8px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 14px; 
            color: #333; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .td-num { width: 60px; text-align: center; color: #999; }
        .td-title { text-align: left; cursor: pointer; padding-left: 15px !important; }
        .td-title:hover { text-decoration: underline; }
        .td-author { width: 130px; text-align: left; color: #555; }
        .td-date { width: 90px; text-align: center; color: #999; font-size: 12px; }
        
        .comment-count-badge { 
            color: #ff5e5e; 
            font-weight: bold; 
            font-size: 12px; 
            margin-left: 5px; 
            font-family: sans-serif; 
        }

        /* [요청사항] 전체보기 제목 위치 및 크기 자연스럽게 개선 */
        #currentBoardTitle { 
            margin: 0; 
            font-size: 22px; 
            letter-spacing: -1px; 
            padding: 10px 0 20px 5px; 
            color: #333; 
            font-weight: bold;
        }

        .post-header-bar { 
            display: flex; 
            align-items: center; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #eee; 
            margin-bottom: 30px; 
        }
        .post-header-bar img { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-right: 15px; 
            border: 1px solid #eee; 
            cursor: pointer; 
        }
        .post-info-text { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .post-info-nick { font-weight: bold; font-size: 16px; cursor: pointer; color: #333; }
        .post-info-meta { font-size: 13px; color: #999; }

        .comment-input-container { 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            padding: 15px; 
            margin-top: 20px; 
        }
        .comment-input-container textarea { 
            width: 100%; 
            border: none; 
            outline: none; 
            resize: none; 
            height: 70px; 
            font-size: 14px; 
            font-family: inherit; 
        }
        .comment-input-footer { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            margin-top: 10px; 
            border-top: 1px solid #f5f5f5; 
            padding-top: 10px; 
        }
        
        .clickable-nick:hover { text-decoration: underline; cursor: pointer; }

        /* 프로필 통계 디자인 */
        .profile-stats { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            border-top: 1px solid #f0f0f0; 
            padding-top: 15px; 
        }
        .stat-item { text-align: center; }
        
        /* [요청사항] 작성글 클릭 가능하도록 스타일 추가 */
        .stat-item.clickable { 
            cursor: pointer; 
            padding: 5px 12px; 
            border-radius: 8px; 
            transition: background 0.2s; 
        }
        .stat-item.clickable:hover { background: #f5f5f5; }
        .stat-item.clickable:hover .stat-value { color: var(--naver-green); text-decoration: underline; }

        .stat-label { font-size: 12px; color: #999; display: block; }
        .stat-value { font-size: 16px; font-weight: bold; color: #333; }

        .pw-container { position: relative; width: 100%; }
        .pw-toggle { 
            position: absolute; 
            right: 12px; 
            top: 12px; 
            cursor: pointer; 
            color: #aaa; 
            font-size: 18px; 
        }

        .post-actions { display: flex; gap: 10px; font-size: 13px; color: #888; }
        .post-actions span { cursor: pointer; }
        .post-actions span:hover { text-decoration: underline; color: #333; }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">Cafe Espresso</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:25px; border-top:1px solid #eee; display:none; padding-top:25px;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 새 글 작성하기</button>
                <button class="btn" style="width:100%; margin-top:10px; background:#f8f9fa; color:#666;" onclick="openSettings()">⚙️ 카페 설정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <h2 id="currentBoardTitle">전체보기</h2>
                <table class="board-table">
                    <thead>
                        <tr>
                            <th class="td-num">번호</th>
                            <th>제목</th>
                            <th class="td-author">작성자</th>
                            <th class="td-date">날짜</th>
                        </tr>
                    </thead>
                    <tbody id="postList"></tbody>
                </table>
                <div class="search-area" style="margin-top:30px;">
                    <input type="text" id="searchInput" class="search-input" placeholder="글 내용 검색..." onkeyup="if(window.event.keyCode==13){searchPosts()}">
                    <button class="search-btn" onclick="searchPosts()">검색</button>
                </div>
            </div>

            <div id="postDetailView" style="display:none; padding:30px;">
                <div onclick="closePost()" style="cursor:pointer; color:#03c75a; font-weight:bold; font-size:14px; margin-bottom:25px; display:inline-block;">◀ 목록으로 돌아가기</div>
                <div id="postDetailHeader"></div>
                
                <div id="postContentView">
                    <div id="postDetailBody" style="min-height:200px; padding:10px 0; font-size:16px; color:#333;"></div>
                    <div id="postImgArea"></div>
                </div>

                <div id="postEditView" style="display:none; margin-top:10px;">
                    <textarea id="editArea" class="input-style" style="height:250px; width:100%; resize:none; padding:15px; line-height:1.6;"></textarea>
                    <div style="margin-top:10px; display:flex; gap:10px; justify-content:flex-end;">
                        <button class="btn" onclick="cancelEdit()">취소</button>
                        <button class="btn btn-green" onclick="submitEdit()">수정 완료</button>
                    </div>
                </div>

                <div id="likeArea" style="margin-top:40px; display:flex; gap:10px;"></div>
                <div class="comment-section" style="margin-top:50px; background:#fcfcfc; padding:25px; border-radius:12px; border:1px solid #f0f0f0;">
                    <div style="font-weight:bold; margin-bottom:20px; font-size:16px;">댓글 <span id="commentCount" style="color:#03c75a;">0</span></div>
                    <div id="commentList"></div>
                    <div id="mainCommentInput" class="comment-input-container" style="display:none;">
                        <textarea id="cInput" placeholder="댓글을 입력해 주세요."></textarea>
                        <div class="comment-input-footer">
                            <button class="btn btn-green" style="padding:8px 25px; border-radius:4px;" onclick="addComment(null)">등록</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="profileModal" class="modal" onclick="this.style.display='none'">
        <div style="background:white; width:340px; border-radius:20px; overflow:hidden; box-shadow:0 15px 50px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
            <div id="p-bg" style="height:110px; background:#eee center/cover;"></div>
            <div style="padding:25px; text-align:center;">
                <img id="p-img" style="width:90px; height:90px; border-radius:50%; border:5px solid white; margin-top:-70px; background:white; object-fit:cover;">
                <h3 id="p-nick" style="margin:15px 0 5px; font-size:20px;"></h3>
                <p id="p-desc" style="color:#888; font-size:14px; margin-bottom:20px; line-height:1.5;"></p>
                
                <div class="profile-stats">
                    <div id="statPostBtn" class="stat-item clickable">
                        <span class="stat-label">작성글</span>
                        <span id="stat-posts" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">커피 쏘기</span>
                        <span id="stat-likes" class="stat-value">0</span>
                    </div>
                </div>

                <button class="btn btn-green" style="width:100%;" onclick="document.getElementById('profileModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:350px; border-radius:20px; padding:40px;">
            <div style="text-align:center; margin-bottom:30px;"><h2 id="authTitle" style="margin:0;">로그인</h2></div>
            <div style="display:flex; margin-bottom:20px; background: #eee; padding: 5px; border-radius: 12px;">
                <div id="lTabL" class="s-tab active" style="flex:1; text-align:center; cursor:pointer; padding:10px; border-radius:10px;" onclick="switchLTab('L')">로그인</div>
                <div id="lTabS" class="s-tab" style="flex:1; text-align:center; cursor:pointer; padding:10px; border-radius:10px;" onclick="switchLTab('S')">회원가입</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <input type="text" id="uId" placeholder="아이디" class="input-style">
                <div class="pw-container">
                    <input type="password" id="uPw" placeholder="비밀번호" class="input-style">
                    <span id="pwToggle" class="pw-toggle" onclick="togglePwView()">👁️</span>
                </div>
                <div id="nickGroup" style="display:none;"><input type="text" id="uNi" placeholder="사용할 닉네임" class="input-style"></div>
                <button id="authBtn" class="btn btn-green" onclick="auth()">로그인하기</button>
                <button class="btn" style="background:#f1f1f1;" onclick="document.getElementById('loginModal').style.display='none'">취소</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:460px; border-radius:20px; padding:30px; max-height:85vh; overflow-y:auto;">
            <div style="display:flex; gap:15px; border-bottom:2px solid #f5f5f5; margin-bottom:25px;">
                <div id="tab0" class="s-tab active" style="padding:10px 5px; cursor:pointer; font-weight:bold;" onclick="showSTab(0)">프로필 관리</div>
                <div id="tab1" class="s-tab" style="padding:10px 5px; cursor:pointer; font-weight:bold; display:none;" onclick="showSTab(1)">멤버 관리</div>
            </div>
            <div id="st-0">
                <div id="bgP" style="width:100%; height:130px; border-radius:12px; background:#f8f9fa center/cover; cursor:pointer; display:flex; align-items:center; justify-content:center; border:2px dashed #ddd; color:#aaa;" onclick="document.getElementById('bgF').click()">배너 배경 업로드</div>
                <img id="pfP" style="width:80px; height:80px; border-radius:50%; border:4px solid white; margin-top:-40px; margin-left:20px; object-fit:cover; background:#eee; box-shadow:0 5px 15px rgba(0,0,0,0.1);" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                <div style="margin-top:20px; display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="setNick" placeholder="닉네임" class="input-style">
                    <textarea id="setDesc" placeholder="자기소개를 적어주세요." class="input-style" style="height:100px; resize:none;"></textarea>
                    <button class="btn btn-green" style="width:100%;" onclick="saveProfile()">설정 저장</button>
                </div>
            </div>
            <div id="st-1" style="display:none;"><div id="userListArea"></div></div>
            <button class="btn" style="width:100%; margin-top:20px; background:#f1f1f1;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const DEFAULT_PF = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23DBDBDB'%3E%3Crect width='24' height='24' fill='%23F0F0F0'/%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        
        let allPosts = [];
        let cafeConfig = {};
        let allUsers = [];
        let currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let currentBoard = '전체보기';
        let currentPostId = null;
        let authMode = 'L';
        let openProfileId = null; // 현재 보고 있는 프로필 유저 ID

        socket.on('load_all', (data) => { 
            allPosts = data.posts; 
            cafeConfig = data.config; 
            allUsers = data.users; 
            
            if (currentUser) {
                const me = allUsers.find(u => u.userId === currentUser.userId);
                if (me) { 
                    currentUser = me; 
                    localStorage.setItem('cafeUser', JSON.stringify(me)); 
                }
            }
            renderAll(); 
            if (currentPostId) {
                renderPostDetail(currentPostId);
            }
            // 프로필 모달이 열려있다면 통계 실시간 업데이트
            if (openProfileId) {
                updateProfileStats(openProfileId);
            }
        });

        socket.on('update_posts', (posts) => { 
            allPosts = posts; 
            renderPosts(); 
            if (currentPostId) {
                renderPostDetail(currentPostId);
            }
            if (openProfileId) {
                updateProfileStats(openProfileId);
            }
        });
        
        socket.on('update_users', (users) => { 
            allUsers = users; 
            updateAuthUI(); 
            if (document.getElementById('settingsModal').style.display === 'flex') {
                renderUserAdmin();
            }
        });

        function showProfile(idOrNick) {
            let user = allUsers.find(u => u.userId === idOrNick) || allUsers.find(u => u.nickname === idOrNick);
            if (!user) {
                return alert("유저 정보를 찾을 수 없습니다.");
            }
            
            openProfileId = user.userId;
            const badge = user.role === '주인장' ? '👑 ' : (user.role === '점원' ? '⭐ ' : '');
            
            document.getElementById('p-bg').style.backgroundImage = user.bgImg ? `url(${user.bgImg})` : 'none';
            document.getElementById('p-bg').style.backgroundColor = user.bgImg ? 'transparent' : '#eee';
            document.getElementById('p-img').src = user.profileImg || DEFAULT_PF;
            document.getElementById('p-nick').innerText = badge + user.nickname;
            document.getElementById('p-desc').innerText = user.profileDesc || "안녕하세요! 반갑습니다.";
            
            // 모아보기 버튼 이벤트 연결
            document.getElementById('statPostBtn').onclick = () => {
                viewUserPosts(user.userId, user.nickname);
            };
            
            updateProfileStats(user.userId);
            document.getElementById('profileModal').style.display = 'flex';
        }

        // [요청사항] 실시간 게시글/커피 수 집계 함수
        function updateProfileStats(userId) {
            if (!openProfileId || openProfileId !== userId) return;
            
            // 실시간으로 전체 글에서 해당 유저의 글 필터링
            const userPosts = allPosts.filter(p => p.userId === userId);
            const totalLikes = userPosts.reduce((acc, p) => acc + (p.likedBy?.length || 0), 0);
            
            document.getElementById('stat-posts').innerText = userPosts.length;
            document.getElementById('stat-likes').innerText = totalLikes;
        }

        // [요청사항] 유저 작성글 모아보기 기능 (네이버 카페 스타일)
        function viewUserPosts(userId, nickname) {
            document.getElementById('profileModal').style.display = 'none';
            openProfileId = null;
            
            currentBoard = `${nickname}님의 작성글`;
            document.getElementById('currentBoardTitle').innerText = currentBoard;
            
            // 해당 유저의 글만 필터링해서 화면에 뿌림
            const filtered = allPosts.filter(p => p.userId === userId);
            displayPosts(filtered);
            closePost();
        }

        function renderAll() {
            const bEl = document.getElementById('boardList');
            let html = `<div class="board-item ${currentBoard === '전체보기' ? 'active' : ''}" onclick="filterBoard('전체보기')">📋 전체보기</div>`;
            
            cafeConfig.boards.forEach(b => {
                html += `<div class="board-item ${currentBoard === b ? 'active' : ''}" onclick="filterBoard('${b}')">📋 ${b}</div>`;
            });
            
            bEl.innerHTML = html;
            updateAuthUI();
            renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if (currentUser) {
                const badge = currentUser.role === '주인장' ? '👑 ' : (currentUser.role === '점원' ? '⭐ ' : '');
                h.innerHTML = `
                    <span onclick="showProfile('${currentUser.userId}')" style="cursor:pointer; font-weight:700;">
                        ${badge}${currentUser.nickname}
                    </span> 
                    <button class="btn" onclick="logout()" style="padding:6px 12px; font-size:12px; margin-left:15px; background:#fff; border:1px solid #ddd;">로그아웃</button>`;
                document.getElementById('sideMenu').style.display = 'block';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function renderPosts() {
            // "모아보기" 상태가 아닐 때만 일반 게시판 필터링 적용
            if (!currentBoard.includes('님의 작성글')) {
                let filtered = currentBoard === '전체보기' ? allPosts : allPosts.filter(p => p.board === currentBoard);
                displayPosts(filtered);
            }
        }

        function displayPosts(arr) {
            const listEl = document.getElementById('postList');
            const sorted = [...arr].reverse();
            
            if (sorted.length === 0) {
                listEl.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:100px; color:#ccc;">게시글이 없습니다.</td></tr>';
                return;
            }

            listEl.innerHTML = sorted.map((p, idx) => {
                const u = allUsers.find(x => x.userId === p.userId);
                const badge = u?.role === '주인장' ? '👑' : (u?.role === '점원' ? '⭐' : '');
                const cCount = (p.comments || []).reduce((acc, c) => acc + 1 + (c.replies?.length || 0), 0);
                const iden = p.userId || p.nickname;
                const timeStr = p.time.split(',')[0].replace(/\s/g, '').slice(2);

                return `
                    <tr>
                        <td class="td-num">${sorted.length - idx}</td>
                        <td class="td-title" onclick="openPost(${p.id})">
                            ${p.content.substring(0,45)}${p.content.length > 45 ? '...' : ''}
                            ${p.image ? '<span style="font-size:11px; margin-left:3px;">🖼️</span>' : ''}
                            ${cCount > 0 ? `<span class="comment-count-badge">${cCount}</span>` : ''}
                        </td>
                        <td class="td-author">
                            <span class="clickable-nick" onclick="event.stopPropagation(); showProfile('${iden}')">
                                ${badge}${p.nickname}
                            </span>
                        </td>
                        <td class="td-date">${timeStr}</td>
                    </tr>`;
            }).join('');
        }

        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) { 
                renderPosts(); 
                return; 
            }
            let baseArr = currentBoard === '전체보기' ? allPosts : allPosts.filter(p => p.board === currentBoard);
            let filtered = baseArr.filter(p => p.content.toLowerCase().includes(keyword) || p.nickname.toLowerCase().includes(keyword));
            displayPosts(filtered);
        }

        function openPost(id) {
            currentPostId = id;
            cancelEdit();
            document.getElementById('listView').style.display = 'none';
            document.getElementById('postDetailView').style.display = 'block';
            renderPostDetail(id);
            window.scrollTo(0, 0);
        }

        function renderPostDetail(id) {
            const p = allPosts.find(x => x.id === id); 
            if (!p) return;
            
            const u = allUsers.find(x => x.userId === p.userId);
            const badge = u?.role === '주인장' ? '👑' : (u?.role === '점원' ? '⭐' : '');
            const iden = p.userId || p.nickname;
            const canManage = currentUser && (currentUser.userId === p.userId || currentUser.role === '주인장');

            document.getElementById('postDetailHeader').innerHTML = `
                <div class="post-header-bar">
                    <img src="${u?.profileImg || DEFAULT_PF}" onclick="showProfile('${iden}')">
                    <div class="post-info-text">
                        <span class="post-info-nick" onclick="showProfile('${iden}')">${badge}${p.nickname}</span>
                        <span class="post-info-meta">${p.time}</span>
                    </div>
                    ${canManage ? `
                    <div class="post-actions">
                        <span onclick="startEdit()">수정</span>
                        <span onclick="deletePost(${p.id})">삭제</span>
                    </div>` : ''}
                </div>`;
            
            document.getElementById('postDetailBody').innerHTML = `<p style="white-space:pre-wrap; line-height:1.8;">${p.content}</p>`;
            document.getElementById('postImgArea').innerHTML = p.image ? `<img src="${p.image}" style="max-width:100%; border-radius:8px; margin-top:25px;">` : "";
            
            const isLiked = currentUser && p.likedBy?.includes(currentUser.userId);
            document.getElementById('likeArea').innerHTML = `
                <button class="btn ${isLiked ? 'btn-green' : ''}" onclick="toggleLike(${p.id})" style="display:flex; align-items:center; gap:8px;">
                    ${isLiked ? '☕' : '🍵'} 커피 쏘기 ${p.likedBy?.length || 0}
                </button>`;
                
            renderComments(p);
        }

        function startEdit() {
            const p = allPosts.find(x => x.id === currentPostId);
            if (!p) return;
            document.getElementById('postContentView').style.display = 'none';
            document.getElementById('postEditView').style.display = 'block';
            document.getElementById('editArea').value = p.content;
        }

        function cancelEdit() {
            document.getElementById('postContentView').style.display = 'block';
            document.getElementById('postEditView').style.display = 'none';
        }

        function submitEdit() {
            const newContent = document.getElementById('editArea').value.trim();
            if (!newContent) {
                return alert("내용을 입력해주세요.");
            }
            socket.emit('edit_post', { 
                postId: currentPostId, 
                userId: currentUser.userId, 
                newContent 
            });
            cancelEdit();
        }

        function deletePost(id) {
            if (!confirm("정말 이 글을 삭제하시겠습니까?")) return;
            socket.emit('delete_post', { 
                postId: id, 
                userId: currentUser.userId 
            });
            closePost();
        }

        function togglePwView() {
            const pwInput = document.getElementById('uPw');
            const toggleBtn = document.getElementById('pwToggle');
            if (pwInput.type === 'password') { 
                pwInput.type = 'text'; 
                toggleBtn.innerText = '🔒'; 
            } else { 
                pwInput.type = 'password'; 
                toggleBtn.innerText = '👁️'; 
            }
        }

        function renderComments(post) {
            const listEl = document.getElementById('commentList');
            const comments = post.comments || [];
            let totalCount = 0;
            
            let html = comments.map(c => {
                totalCount += 1 + (c.replies?.length || 0);
                const cIden = c.userId || c.nickname;
                const cUser = allUsers.find(x => x.userId === c.userId);
                const isCLiked = currentUser && c.likedBy?.includes(currentUser.userId);
                
                let commentHtml = `
                <div style="padding:15px 0; border-bottom:1px solid #f2f2f2;">
                    <div style="display:flex; gap:12px;">
                        <img src="${cUser?.profileImg || DEFAULT_PF}" style="width:36px; height:36px; border-radius:50%; cursor:pointer; object-fit:cover;" onclick="showProfile('${cIden}')">
                        <div style="flex:1;">
                            <div style="font-size:13px; font-weight:bold; cursor:pointer;" onclick="showProfile('${cIden}')">${c.nickname}</div>
                            <div style="font-size:14px; margin:6px 0; color:#333; line-height:1.4;">${c.content}</div>
                            <div style="font-size:12px; color:#999; display:flex; gap:15px; align-items:center;">
                                <span>${c.time}</span>
                                <span style="cursor:pointer;" onclick="toggleReplyInput(${c.id})">답글</span>
                                <span style="cursor:pointer; color:${isCLiked ? '#03c75a' : ''}" onclick="toggleCommentLike(${post.id}, ${c.id})">☕ ${c.likedBy?.length || 0}</span>
                            </div>
                        </div>
                    </div>
                    <div id="replyArea-${c.id}" style="display:none; margin:15px 0 0 48px;">
                        <div class="comment-input-container" style="margin-top:0;">
                            <textarea id="rInput-${c.id}" placeholder="답글 내용을 입력하세요"></textarea>
                            <div class="comment-input-footer"><button class="btn btn-green" onclick="addComment(${c.id})">등록</button></div>
                        </div>
                    </div>
                </div>`;

                (c.replies || []).forEach(r => {
                    const rIden = r.userId || r.nickname;
                    const rUser = allUsers.find(x => x.userId === r.userId);
                    const isRLiked = currentUser && r.likedBy?.includes(currentUser.userId);
                    commentHtml += `
                    <div style="padding:15px 0 15px 48px; border-bottom:1px solid #f9f9f9; background:#fbfbfb; display:flex; gap:12px;">
                        <img src="${rUser?.profileImg || DEFAULT_PF}" style="width:30px; height:30px; border-radius:50%; cursor:pointer; object-fit:cover;" onclick="showProfile('${rIden}')">
                        <div style="flex:1;">
                            <div style="font-size:13px; font-weight:bold; cursor:pointer;" onclick="showProfile('${rIden}')">${r.nickname}</div>
                            <div style="font-size:14px; margin:5px 0; color:#333;">${r.content}</div>
                            <div style="font-size:12px; color:#999;">
                                <span>${r.time}</span>
                                <span style="cursor:pointer; margin-left:15px; color:${isRLiked ? '#03c75a' : ''}" onclick="toggleCommentLike(${post.id}, ${c.id}, ${r.id})">☕ ${r.likedBy?.length || 0}</span>
                            </div>
                        </div>
                    </div>`;
                });
                return commentHtml;
            }).join('');
            
            listEl.innerHTML = html;
            document.getElementById('commentCount').innerText = totalCount;
            document.getElementById('mainCommentInput').style.display = currentUser ? 'block' : 'none';
        }

        function addComment(parentId) {
            if (!currentUser) return alert("로그인 후 이용 가능합니다.");
            const input = parentId ? document.getElementById(`rInput-${parentId}`) : document.getElementById('cInput');
            const content = input.value.trim();
            if (!content) return;
            
            socket.emit('new_comment', { 
                postId: currentPostId, 
                commentId: parentId, 
                data: { 
                    userId: currentUser.userId, 
                    nickname: currentUser.nickname, 
                    content 
                } 
            });
            input.value = ""; 
            if (parentId) toggleReplyInput(parentId);
        }

        function toggleReplyInput(id) { 
            const el = document.getElementById(`replyArea-${id}`); 
            el.style.display = (el.style.display === 'none') ? 'block' : 'none'; 
        }

        function toggleCommentLike(pId, cId, rId = null) { 
            if (!currentUser) return alert("로그인 후 이용 가능합니다."); 
            socket.emit('toggle_comment_like', { 
                postId: pId, 
                commentId: cId, 
                replyId: rId, 
                userId: currentUser.userId 
            }); 
        }

        function toggleLike(id) { 
            if (!currentUser) return alert("로그인 후 이용 가능합니다."); 
            socket.emit('toggle_like', { 
                postId: id, 
                userId: currentUser.userId 
            }); 
        }

        function filterBoard(name) {
            openProfileId = null; // 필터 변경 시 보고 있는 프로필 추적 해제
            currentBoard = name;
            document.getElementById('currentBoardTitle').innerText = name;
            renderAll();
            closePost();
        }

        function closePost() {
            currentPostId = null;
            document.getElementById('listView').style.display = 'block';
            document.getElementById('postDetailView').style.display = 'none';
        }

        function switchLTab(m) {
            authMode = m; 
            const isL = (m === 'L');
            document.getElementById('authTitle').innerText = isL ? "로그인" : "회원가입";
            document.getElementById('nickGroup').style.display = isL ? 'none' : 'block';
            document.getElementById('authBtn').innerText = isL ? "로그인하기" : "가입 완료";
            document.getElementById('lTabL').classList.toggle('active', isL);
            document.getElementById('lTabS').classList.toggle('active', !isL);
            document.getElementById('uPw').type = 'password'; 
            document.getElementById('pwToggle').innerText = '👁️';
        }

        async function auth() {
            const id = document.getElementById('uId').value.trim();
            const pw = document.getElementById('uPw').value.trim();
            const ni = document.getElementById('uNi').value.trim();
            
            if (!id || !pw || (authMode === 'S' && !ni)) {
                return alert("모든 항목을 입력해 주세요.");
            }
            
            const url = authMode === 'L' ? '/api/login' : '/api/signup';
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ userId: id, password: pw, nickname: ni })
            });
            const d = await res.json();
            
            if (d.success) { 
                if (authMode === 'L') { 
                    localStorage.setItem('cafeUser', JSON.stringify(d.user)); 
                    location.reload(); 
                } else { 
                    alert("가입되었습니다! 로그인해 주세요."); 
                    switchLTab('L'); 
                } 
            } else {
                alert(d.message || "오류가 발생했습니다.");
            }
        }

        function logout() { 
            localStorage.removeItem('cafeUser'); 
            location.reload(); 
        }

        function openSettings() {
            if (!currentUser) return;
            document.getElementById('setNick').value = currentUser.nickname;
            document.getElementById('setDesc').value = currentUser.profileDesc || "";
            document.getElementById('pfP').src = currentUser.profileImg || DEFAULT_PF;
            document.getElementById('bgP').style.backgroundImage = currentUser.bgImg ? `url(${currentUser.bgImg})` : 'none';
            document.getElementById('bgP').innerText = currentUser.bgImg ? "" : "배너 배경 업로드";
            
            const isStaff = (currentUser.role === '주인장' || currentUser.role === '점원');
            document.getElementById('tab1').style.display = isStaff ? 'block' : 'none';
            
            showSTab(0); 
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function showSTab(idx) {
            document.getElementById('st-0').style.display = (idx === 0) ? 'block' : 'none';
            document.getElementById('st-1').style.display = (idx === 1) ? 'block' : 'none';
            document.getElementById('tab0').classList.toggle('active', idx === 0);
            document.getElementById('tab1').classList.toggle('active', idx === 1);
            if (idx === 1) renderUserAdmin();
        }

        function renderUserAdmin() {
            const area = document.getElementById('userListArea');
            area.innerHTML = allUsers.map(u => {
                const isStaff = cafeConfig.staffList.includes(u.userId);
                return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;">
                    <div>
                        <div style="font-weight:bold;">${u.role==='주인장'?'👑':(isStaff?'⭐':'👤')} ${u.nickname}</div>
                        <div style="font-size:12px; color:#aaa;">ID: ${u.userId}</div>
                    </div>
                    <div>
                        ${currentUser.role === '주인장' && u.userId !== 'Mint_pocky' ? `<button class="btn" style="padding:4px 8px; font-size:11px;" onclick="manageUser('${u.userId}','${isStaff?'demote':'promote'}')">${isStaff?'강등':'임명'}</button>` : ''}
                        ${u.userId !== 'Mint_pocky' && u.userId !== currentUser.userId ? `<button class="btn" style="padding:4px 8px; font-size:11px; background:#ffecec; color:#ff4d4d; margin-left:5px;" onclick="manageUser('${u.userId}','kick')">강퇴</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function manageUser(tId, act) {
            if (!confirm("정말 처리하시겠습니까?")) return;
            const res = await fetch('/api/admin/manage-user', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ adminId: currentUser.userId, targetId: tId, action: act }) 
            });
            const d = await res.json();
            if (d.success) { 
                alert("반영되었습니다."); 
            }
        }

        async function saveProfile() {
            const bg = document.getElementById('bgP').style.backgroundImage;
            const res = await fetch('/api/update-profile', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ 
                    userId: currentUser.userId, 
                    nickname: document.getElementById('setNick').value, 
                    profileDesc: document.getElementById('setDesc').value, 
                    profileImg: document.getElementById('pfP').src, 
                    bgImg: bg && bg !== 'none' ? bg.slice(5, -2).replace(/"/g, "") : "" 
                })
            });
            const result = await res.json();
            if (result.success) { 
                alert("프로필이 수정되었습니다."); 
                location.reload(); 
            } else { 
                alert(result.message || "실패했습니다."); 
            }
        }

        function pvImg(input, targetId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    if (targetId === 'bgP') { 
                        document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`; 
                        document.getElementById(targetId).innerText = ""; 
                    } else { 
                        document.getElementById(targetId).src = e.target.result; 
                    }
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
