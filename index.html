<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">카페 에스프레소</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:20px; border-top:1px solid #eee; display:none;">
                <button class="btn btn-green" style="width:100%; margin-top:15px;" onclick="location.href='/write'">📝 글쓰기</button>
                <button class="btn" style="width:100%; margin-top:8px; background:#f9f9f9; color:#666; border:1px solid #ddd;" onclick="openSettings()">⚙️ 카페 설정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <h2 id="currentBoardTitle" style="padding:20px 20px 0 20px; margin:0; font-size: 18px;">전체보기</h2>
                <div id="postList"></div>
            </div>
            
            <div id="postDetailView" style="display:none; padding:20px;">
                <div onclick="closePost()" style="cursor:pointer; color:#888; margin-bottom:15px; font-size:14px;">← 목록으로 돌아가기</div>
                <div id="postDetailBody"></div>
                <div id="likeArea" style="margin:20px 0; text-align:center;"></div>
            </div>
        </section>
    </div>

    <div id="profileModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" style="padding:0; overflow:hidden;" onclick="event.stopPropagation()">
            <div id="p-bg" style="height:100px; background:#ddd center/cover;"></div>
            <div style="padding:20px; position:relative;">
                <img id="p-img" style="width:70px; height:70px; border-radius:50%; border:3px solid white; margin-top:-45px; background:white; object-fit:cover;">
                <h3 id="p-nick" style="margin:10px 0 5px 0;"></h3>
                <p id="p-desc" style="color:#666; font-size:14px; margin-bottom:15px;"></p>
                <button class="btn" style="width:100%; background:#eee;" onclick="document.getElementById('profileModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; margin-bottom:20px;">
                <div id="tabL" class="s-tab active" onclick="switchAuthTab('L')">로그인</div>
                <div id="tabS" class="s-tab" onclick="switchAuthTab('S')">회원가입</div>
            </div>
            <input type="text" id="uId" placeholder="아이디" class="input-style">
            <input type="password" id="uPw" placeholder="비밀번호" class="input-style">
            <div id="signupOnly" style="display:none;">
                <input type="text" id="uNi" placeholder="사용할 닉네임" class="input-style">
            </div>
            <button id="authBtn" class="btn btn-green" style="width:100%; padding:12px;" onclick="handleAuth()">로그인</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#eee;" onclick="document.getElementById('loginModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; margin-bottom:15px;">
                <div class="s-tab active" onclick="showSTab(0, this)">내 프로필</div>
                <div id="adminTab" class="s-tab" style="display:none;" onclick="showSTab(1, this)">관리자 전용</div>
            </div>
            <div id="st-0" class="st-content">
                <div id="bgP" style="height:80px; background:#eee center/cover; border-radius:10px; cursor:pointer;" onclick="document.getElementById('bgF').click()"></div>
                <img id="pfP" style="width:50px; height:50px; border-radius:50%; border:2px solid white; margin-top:-25px; margin-left:10px; cursor:pointer;" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                <input type="text" id="setNick" class="input-style" style="margin-top:10px;">
                <textarea id="setDesc" class="input-style"></textarea>
                <button class="btn btn-green" style="width:100%;" onclick="saveProfile()">저장</button>
            </div>
            <div id="st-1" class="st-content" style="display:none;">
                <div id="userListArea"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let authMode = 'L'; // L: 로그인, S: 회원가입

        socket.on('load_all', d => { allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; renderAll(); });
        socket.on('update_posts', p => { allPosts = p; renderPosts(); });

        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.getElementById('boardList').innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + cafeConfig.boards.map(b=>`<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            updateAuthUI();
            renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                h.innerHTML = `<b onclick="showProfile('${currentUser.nickname}')" style="cursor:pointer; color:#2db400;">${currentUser.nickname}님</b> <small onclick="logout()" style="margin-left:8px; cursor:pointer; color:#999;">로그아웃</small>`;
                document.getElementById('sideMenu').style.display = 'block';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function renderPosts() {
            const t = document.getElementById('currentBoardTitle').innerText;
            let f = t === "전체보기" ? allPosts : allPosts.filter(p=>p.board===t);
            f.sort((a, b) => (b.board === "공지사항") - (a.board === "공지사항") || b.id - a.id);

            document.getElementById('postList').innerHTML = f.map(p=>`
                <div class="post-list-item ${p.board==='공지사항'?'notice-pinned':''}" onclick="openPost(${p.id})">
                    <div style="flex:1;">
                        <div style="font-weight:bold; margin-bottom:5px;">${p.board==='공지사항'?'<span class="notice-badge">공지</span>':''}${p.content.substring(0,35)}</div>
                        <small style="color:#2db400; font-weight:bold; cursor:pointer;" onclick="event.stopPropagation(); showProfile('${p.nickname}')">${p.nickname}</small>
                        <small style="color:#aaa;"> · ☕ ${p.likedBy?p.likedBy.length:0}</small>
                    </div>
                    ${p.image ? `<img src="${p.image}" class="post-thumb">` : ''}
                </div>
            `).join('');
        }

        // 1번 요청: 프로필 보기 기능
        function showProfile(nick) {
            const u = allUsers.find(x => x.nickname === nick);
            if(!u) return alert("유저 정보를 찾을 수 없습니다.");
            document.getElementById('p-bg').style.backgroundImage = u.bgImg ? `url(${u.bgImg})` : '';
            document.getElementById('p-img').src = u.profileImg || 'https://via.placeholder.com/80';
            document.getElementById('p-nick').innerText = u.nickname + " (" + u.role + ")";
            document.getElementById('p-desc').innerText = u.profileDesc || "소개글이 없습니다.";
            document.getElementById('profileModal').style.display = 'flex';
        }

        // 2번 요청: 로그인/회원가입 탭 전환
        function switchAuthTab(mode) {
            authMode = mode;
            document.getElementById('tabL').classList.toggle('active', mode === 'L');
            document.getElementById('tabS').classList.toggle('active', mode === 'S');
            document.getElementById('signupOnly').style.display = mode === 'S' ? 'block' : 'none';
            document.getElementById('authBtn').innerText = mode === 'L' ? '로그인' : '회원가입 완료';
        }

        async function handleAuth() {
            const userId = document.getElementById('uId').value.trim();
            const password = document.getElementById('uPw').value.trim();
            const nickname = document.getElementById('uNi').value.trim();

            if(!userId || !password) return alert("아이디와 비밀번호를 입력해주세요.");
            if(authMode === 'S' && !nickname) return alert("닉네임을 입력해주세요.");

            const res = await fetch(authMode === 'L' ? '/api/login' : '/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password, nickname })
            });
            const data = await res.json();
            
            if(data.success) {
                if(authMode === 'L') {
                    localStorage.setItem('cafeUser', JSON.stringify(data.user));
                    location.reload();
                } else {
                    alert("가입 성공! 이제 로그인을 해주세요.");
                    switchAuthTab('L');
                }
            } else {
                alert(data.message || "오류가 발생했습니다.");
            }
        }

        function openPost(id) {
            const p = allPosts.find(x=>x.id===id);
            openedPostId = id;
            document.getElementById('listView').style.display='none';
            document.getElementById('postDetailView').style.display='block';
            document.getElementById('postDetailBody').innerHTML = `
                <div style="display:flex; align-items:center; margin-bottom:15px;">
                    <img src="${p.profileImg || 'https://via.placeholder.com/40'}" style="width:35px; height:35px; border-radius:50%; margin-right:10px;">
                    <b onclick="showProfile('${p.nickname}')" style="cursor:pointer;">${p.nickname}</b>
                </div>
                <div style="white-space:pre-wrap; line-height:1.6;">${p.content}</div>
                ${p.image?`<img src="${p.image}" style="width:100%; border-radius:10px; margin-top:15px;">`:''}
            `;
            const isLiked = currentUser && p.likedBy && p.likedBy.includes(currentUser.userId);
            document.getElementById('likeArea').innerHTML = `
                <button class="btn" style="background:${isLiked?'#fff0f0':'#f9f9f9'}; border:1px solid ${isLiked?'#ff4d4d':'#ddd'}" onclick="toggleLike(${p.id})">
                    ☕ 커피 쏘기 (${p.likedBy?p.likedBy.length:0})
                </button>
            `;
        }

        function closePost() { document.getElementById('listView').style.display='block'; document.getElementById('postDetailView').style.display='none'; }
        function filterBoard(n, e) { document.querySelectorAll('.board-item').forEach(i=>i.classList.remove('active')); e.classList.add('active'); document.getElementById('currentBoardTitle').innerText=n; closePost(); renderPosts(); }
        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function toggleLike(postId) { if(!currentUser) return alert("로그인하세요."); socket.emit('toggle_like', { postId, userId: currentUser.userId }); }
        
        // 설정 및 기타 함수들은 기존 로직과 동일
        function openSettings() { if(!currentUser) return; document.getElementById('setNick').value = currentUser.nickname; document.getElementById('setDesc').value = currentUser.profileDesc || ""; document.getElementById('settingsModal').style.display='flex'; }
        async function saveProfile() { if(!confirm("저장하시겠습니까?")) return; /* API 호출 로직 */ }
    </script>
</body>
</html>
