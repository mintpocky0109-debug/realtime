<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 id="cafeName" style="cursor:pointer;" onclick="location.reload()">☕ 카페</h1>
        <div>
            <button class="btn" style="background:#f3f4f6; margin-right:8px;" onclick="openSettings()">⚙️ 설정</button>
            <button class="btn btn-green" onclick="location.href='/write'">📝 글쓰기</button>
        </div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
        </nav>

        <section class="content">
            <div id="listView" style="padding:30px;">
                <h2 id="currentBoardTitle" style="margin-top:0;">전체보기</h2>
                <div id="postList"></div>
            </div>

            <div id="postDetailView" style="display:none; padding:40px; background:white; min-height:100%;">
                <div style="cursor:pointer; color:#888; margin-bottom:30px;" onclick="closePost()">← 목록으로</div>
                <div id="postDetailBody" class="post-detail-content"></div>
                <div class="comment-section" style="margin-top:50px; border-top:1px solid #eee; padding-top:30px;">
                    <h4 id="commentCountTitle">댓글</h4>
                    <div id="commentList"></div>
                    <div style="display:flex; gap:10px; margin-top:30px; background:#f9fafb; padding:15px; border-radius:15px;">
                        <input id="commentInput" type="text" placeholder="댓글을 남겨주세요..." class="input-style" style="margin:0;">
                        <button class="btn btn-green" onclick="submitComment()">등록</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="settingsModal" class="modal">
        <div class="settings-container">
            <nav class="settings-nav">
                <div class="settings-nav-item active" onclick="switchTab('tab-info')">내 정보</div>
                <div class="settings-nav-item admin-only" onclick="switchTab('tab-design')">카페 디자인</div>
                <div class="settings-nav-item owner-only" onclick="switchTab('tab-admin')">권한 관리</div>
                <div class="settings-nav-item owner-only" onclick="switchTab('tab-data')" style="color:red;">데이터 관리</div>
                <div style="margin-top:auto; padding-top:20px;">
                    <button class="btn" style="width:100%; background:#ddd;" onclick="closeSettings()">닫기</button>
                </div>
            </nav>
            <main class="settings-main">
                <div id="tab-info" class="settings-tab-content active">
                    <h3>👤 내 프로필</h3>
                    <div id="myStatusDisplay" style="padding:20px; background:#f8f9fa; border-radius:12px; line-height:2;"></div>
                </div>
                <div id="tab-design" class="settings-tab-content">
                    <h3>🎨 카페 디자인 변경</h3>
                    <p style="font-size:13px; color:#888;">주인장 및 점원만 수정 가능합니다.</p>
                    <label>카페 이름</label>
                    <input type="text" id="newCafeName" class="input-style" placeholder="새 카페명">
                    <label>테마 컬러</label>
                    <input type="color" id="newThemeColor" style="width:100%; height:45px; border:none; border-radius:8px; cursor:pointer;">
                    <button class="btn btn-green" style="width:100%; margin-top:20px;" onclick="updateDesign()">디자인 저장</button>
                </div>
                <div id="tab-admin" class="settings-tab-content">
                    <h3>🛡️ 권한 설정</h3>
                    <label>점원 고용 (닉네임)</label>
                    <input type="text" id="staffNick" class="input-style" placeholder="고용할 유저 닉네임">
                    <button class="btn" style="width:100%; background:orange; color:white;" onclick="hireStaff()">점원 임명하기</button>
                </div>
                <div id="tab-data" class="settings-tab-content">
                    <h3 style="color:red;">⚠️ 위험 지역</h3>
                    <p>게시판의 모든 데이터를 삭제합니다. 이 작업은 되돌릴 수 없습니다.</p>
                    <button class="btn" style="width:100%; background:red; color:white; padding:15px;" onclick="deleteAllPosts()">전체 게시글 삭제</button>
                </div>
            </main>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, openedPostId = null, replyTargetId = null;
        const myNick = localStorage.getItem('userNickname') || "";

        socket.on('load_all', data => { cafeConfig = data.config; allPosts = data.posts; renderAll(); });
        socket.on('update_config', c => { cafeConfig = c; renderAll(); });
        socket.on('update_posts', p => { allPosts = p; renderPosts(); if(openedPostId) renderPostDetail(openedPostId); });

        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.documentElement.style.setProperty('--naver-green', cafeConfig.themeColor);
            const container = document.getElementById('boardList');
            container.innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + 
                cafeConfig.boards.map(b => `<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            renderPosts();
        }

        function renderPosts() {
            const list = document.getElementById('postList');
            const title = document.getElementById('currentBoardTitle').innerText;
            const filtered = (title === "전체보기") ? allPosts : allPosts.filter(p => p.board === title);
            list.innerHTML = filtered.slice().reverse().map(p => `
                <div class="post-list-item" onclick="openPost(${p.id})">
                    <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">${p.content.substring(0,35)}...</div>
                    <div style="font-size:13px; color:#888;">${p.nickname} · ☕ ${p.likedBy.length} · 댓글 ${p.comments.length}</div>
                </div>
            `).join('');
        }

        function openPost(id) {
            openedPostId = id;
            document.getElementById('listView').style.display = 'none';
            document.getElementById('postDetailView').style.display = 'block';
            window.scrollTo(0,0);
            renderPostDetail(id);
        }

        function renderPostDetail(id) {
            const post = allPosts.find(p => p.id === id);
            if(!post) return closePost();
            const isLiked = post.likedBy.includes(myNick);
            document.getElementById('postDetailBody').innerHTML = `
                <div style="margin-bottom:20px;"><span class="btn" style="background:var(--naver-green-light); color:var(--naver-green); font-size:11px;">${post.board}</span></div>
                <h1 style="margin-bottom:10px;">${post.nickname} <span style="font-size:12px; color:#999;">(${post.role})</span></h1>
                <div style="color:#bbb; font-size:13px; margin-bottom:30px;">${post.time}</div>
                <div style="font-size:16px; line-height:1.8; white-space:pre-wrap;">${post.content}</div>
                ${post.image ? `<img src="${post.image}">` : ""}
                <div style="text-align:center; margin:40px 0;">
                    <button class="btn" style="border:1px solid ${isLiked?'var(--naver-green)':'#ddd'}; background:${isLiked?'var(--naver-green-light)':'white'}; color:${isLiked?'var(--naver-green)':'#333'};" 
                        onclick="socket.emit('like_post', {postId:${post.id}, nickname:myNick})">☕ 커피 쏘기 ${post.likedBy.length}</button>
                </div>
            `;
            document.getElementById('commentCountTitle').innerText = `댓글 ${post.comments.length}`;
            document.getElementById('commentList').innerHTML = post.comments.filter(c => !c.parentId).map(c => `
                <div class="comment">
                    <div style="font-weight:bold; margin-bottom:5px;">${c.nickname} <span style="font-size:11px; color:#bbb; margin-left:10px;">${c.time}</span></div>
                    <div style="font-size:14px;">${c.content}</div>
                    <div style="margin-top:8px; color:var(--naver-green); font-size:12px; cursor:pointer;" onclick="setReply(${c.id})">답글 쓰기</div>
                    ${post.comments.filter(r => r.parentId === c.id).map(r => `
                        <div class="comment reply">
                            <div style="font-weight:bold; margin-bottom:5px;">↳ ${r.nickname}</div>
                            <div style="font-size:14px;">${r.content}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function openSettings() {
            const isOwner = myNick === cafeConfig.ownerNick;
            const isStaff = cafeConfig.staffList.includes(myNick);
            document.getElementById('settingsModal').style.display = 'flex';
            document.getElementById('myStatusDisplay').innerText = `닉네임: ${myNick}\n등급: ${isOwner?'주인장':isStaff?'점원':'멤버'}`;
            
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = (isOwner || isStaff) ? 'block' : 'none');
            document.querySelectorAll('.owner-only').forEach(el => el.style.display = isOwner ? 'block' : 'none');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.settings-tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.settings-nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function submitComment() {
            const val = document.getElementById('commentInput').value.trim();
            if(!val || !myNick) return;
            socket.emit('new_comment', { postId: openedPostId, nickname: myNick, content: val, parentId: replyTargetId });
            document.getElementById('commentInput').value = "";
            replyTargetId = null;
        }

        function filterBoard(name, el) {
            document.querySelectorAll('.board-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('currentBoardTitle').innerText = name;
            closePost();
            renderPosts();
        }

        function updateDesign() {
            socket.emit('admin_action', { type: 'config', adminNick: myNick, config: { cafeName: document.getElementById('newCafeName').value || cafeConfig.cafeName, themeColor: document.getElementById('newThemeColor').value } });
            alert("변경되었습니다.");
        }

        function hireStaff() {
            socket.emit('admin_action', { type: 'hire', adminNick: myNick, targetNick: document.getElementById('staffNick').value });
            alert("임명되었습니다.");
        }

        function deleteAllPosts() { if(confirm("정말 모든 글을 삭제할까요?")) socket.emit('admin_action', { type:'delete_all', adminNick:myNick }); }
        function closePost() { openedPostId = null; document.getElementById('listView').style.display = 'block'; document.getElementById('postDetailView').style.display = 'none'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function setReply(id) { replyTargetId = id; document.getElementById('commentInput').placeholder = "답글 작성 중..."; document.getElementById('commentInput').focus(); }
    </script>
</body>
</html>
