<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">카페 에스프레소</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:20px; border-top:1px solid #eee; pt:20px;">
                <button class="btn btn-green" style="width:100%; margin-top:15px;" onclick="location.href='/write'">📝 글쓰기</button>
                <button class="btn" style="width:100%; margin-top:8px; background:#f9f9f9; color:#666; border:1px solid #ddd;" onclick="openSettings()">⚙️ 카페 설정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <h2 id="currentBoardTitle" style="padding:25px 25px 0 25px; margin:0;">전체보기</h2>
                <div id="postList" style="margin-top:10px;"></div>
            </div>
            
            <div id="postDetailView" style="display:none; padding:30px;">
                <div onclick="closePost()" style="cursor:pointer; color:#888; margin-bottom:20px; font-size:14px;">← 목록으로 돌아가기</div>
                <div id="postDetailBody"></div>
                <div id="likeArea" style="margin:25px 0; text-align:center;"></div>
                <hr style="border:0; border-top:1px solid #eee;">
                <div id="commentList" style="margin-top:20px;"></div>
            </div>
        </section>
    </div>

    <div id="profileModal" class="modal" onclick="this.style.display='none'">
        <div style="background:white; width:360px; border-radius:20px; overflow:hidden;" onclick="event.stopPropagation()">
            <div id="p-bg" style="height:120px; background:#ddd center/cover;"></div>
            <div style="padding:20px; position:relative;">
                <img id="p-img" style="width:80px; height:80px; border-radius:50%; border:4px solid white; margin-top:-60px; background:white; object-fit:cover;">
                <h3 id="p-nick" style="margin:10px 0 5px 0; font-size:20px;"></h3>
                <p id="p-desc" style="color:#666; font-size:14px; line-height:1.5;"></p>
                <button class="btn" style="width:100%; margin-top:15px; background:#eee;" onclick="document.getElementById('profileModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:420px; border-radius:20px; padding:25px;">
            <div style="display:flex; margin-bottom:20px;">
                <div class="s-tab active" onclick="showSTab(0, this)">내 정보 수정</div>
                <div id="adminTab" class="s-tab" style="display:none;" onclick="showSTab(1, this)">회원/보안 관리</div>
            </div>
            
            <div id="st-0" class="st-content active" style="display:block;">
                <div id="bgP" style="width:100%; height:110px; border-radius:10px; background:#eee center/cover; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#888; font-size:12px;" onclick="document.getElementById('bgF').click()">배너 이미지 선택</div>
                <img id="pfP" style="width:70px; height:70px; border-radius:50%; border:3px solid white; margin-top:-35px; margin-left:15px; background:#fff; cursor:pointer; object-fit:cover;" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                
                <input type="text" id="setNick" placeholder="닉네임" class="input-style" style="margin-top:15px;">
                <textarea id="setDesc" placeholder="나를 소개해주세요" class="input-style" style="height:80px; resize:none;"></textarea>
                <button class="btn btn-green" style="width:100%; padding:15px;" onclick="saveProfile()">설정 저장하기</button>
            </div>
            
            <div id="st-1" class="st-content" style="display:none;">
                <h4 style="margin:0 0 10px 0;">점원 임명 및 보안</h4>
                <div id="userListArea" style="max-height:250px; overflow-y:auto; border:1px solid #eee; border-radius:10px;"></div>
            </div>
            <button class="btn" style="width:100%; margin-top:15px; background:#f5f5f5;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:320px; border-radius:20px; padding:30px;">
            <h3 style="margin:0 0 20px 0; text-align:center;">로그인 / 가입</h3>
            <input type="text" id="uId" placeholder="아이디" class="input-style">
            <input type="password" id="uPw" placeholder="비밀번호" class="input-style">
            <input type="text" id="uNi" placeholder="닉네임 (가입 시에만)" class="input-style">
            <button class="btn btn-green" style="width:100%; padding:12px;" onclick="auth('login')">로그인</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#eee;" onclick="auth('signup')">회원가입</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let openedPostId = null;

        socket.on('load_all', d => { allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; renderAll(); });
        socket.on('update_posts', p => { allPosts = p; renderPosts(); if(openedPostId) renderPostDetail(openedPostId); });
        socket.on('update_config', c => { cafeConfig = c; renderAll(); });

        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.getElementById('boardList').innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + cafeConfig.boards.map(b=>`<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            updateAuthUI(); renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                h.innerHTML = `<span style="margin-right:10px;"><b>${currentUser.nickname}</b>님</span> <button class="btn" onclick="logout()" style="padding:5px 10px; font-size:12px;">로그아웃</button>`;
                document.getElementById('sideMenu').style.display = 'block';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function renderPosts() {
            const t = document.getElementById('currentBoardTitle').innerText;
            let f = t === "전체보기" ? allPosts : allPosts.filter(p=>p.board===t);
            
            // 4번 요청: 공지사항 최상단 고정
            f.sort((a, b) => {
                if (a.board === "공지사항" && b.board !== "공지사항") return -1;
                if (a.board !== "공지사항" && b.board === "공지사항") return 1;
                return b.id - a.id;
            });

            document.getElementById('postList').innerHTML = f.map(p=>`
                <div class="post-list-item ${p.board==='공지사항'?'notice-pinned':''}" onclick="openPost(${p.id})">
                    <div style="flex:1;">
                        <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">
                            ${p.board==='공지사항'?'<span class="notice-badge">공지</span>':''}${p.content.substring(0,40)}
                        </div>
                        <small style="color:#2db400; font-weight:bold; cursor:pointer;" onclick="showProfile('${p.nickname}'); event.stopPropagation();">${p.nickname}</small>
                        <small style="color:#aaa;"> · ☕ ${p.likedBy ? p.likedBy.length : 0} · ${p.time.split(' ')[1] || ''}</small>
                    </div>
                    ${p.image ? `<img src="${p.image}" class="post-thumb">` : ''}
                </div>
            `).join('') || '<div style="padding:50px; text-align:center; color:#ccc;">글이 없습니다.</div>';
        }

        function openPost(id) { openedPostId = id; document.getElementById('listView').style.display='none'; document.getElementById('postDetailView').style.display='block'; renderPostDetail(id); window.scrollTo(0,0); }
        function closePost() { openedPostId = null; document.getElementById('listView').style.display='block'; document.getElementById('postDetailView').style.display='none'; }

        function renderPostDetail(id) {
            const p = allPosts.find(x=>x.id===id); if(!p) return;
            const isLiked = currentUser && p.likedBy && p.likedBy.includes(currentUser.userId);
            document.getElementById('postDetailBody').innerHTML = `
                <div style="display:flex; align-items:center; margin-bottom:20px;">
                    <img src="${p.profileImg || 'https://via.placeholder.com/50'}" style="width:45px; height:45px; border-radius:50%; margin-right:12px; object-fit:cover;">
                    <div><b style="font-size:16px;">${p.nickname}</b><br><small style="color:#999;">${p.time} · ${p.board}</small></div>
                </div>
                <div style="font-size:17px; line-height:1.8; white-space:pre-wrap; min-height:100px;">${p.content}</div>
                ${p.image?`<img src="${p.image}" style="max-width:100%; margin-top:25px; border-radius:12px; border:1px solid #eee;">`:''}
            `;
            // 1번 요청: 커피 쏘기 버튼 UI
            document.getElementById('likeArea').innerHTML = `
                <button class="btn" style="background:${isLiked?'#fff0f0':'#f9f9f9'}; border:1px solid ${isLiked?'#ff4d4d':'#ddd'}; padding:12px 30px; font-size:15px;" onclick="toggleLike(${p.id})">
                    ${isLiked?'☕ 커피 한 잔 쐈습니다!':'☕ 커피 쏘기'} <span style="margin-left:5px; font-weight:bold;">${p.likedBy ? p.likedBy.length : 0}</span>
                </button>
            `;
        }

        function toggleLike(postId) {
            if(!currentUser) return alert("로그인이 필요합니다.");
            socket.emit('toggle_like', { postId, userId: currentUser.userId });
        }

        function showProfile(nick) {
            const u = allUsers.find(x=>x.nickname === nick);
            if(!u) return;
            document.getElementById('p-bg').style.backgroundImage = u.bgImg ? `url(${u.bgImg})` : '';
            document.getElementById('p-img').src = u.profileImg || 'https://via.placeholder.com/80';
            document.getElementById('p-nick').innerText = u.nickname;
            document.getElementById('p-desc').innerText = u.profileDesc || "안녕하세요! 반갑습니다.";
            document.getElementById('profileModal').style.display = 'flex';
        }

        function pvImg(input, targetId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    if (targetId === 'bgP') {
                        document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`;
                        document.getElementById(targetId).innerText = '';
                    }
                    else document.getElementById(targetId).src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function saveProfile() {
            if(!confirm("설정을 저장하시겠습니까?")) return; // 5번 요청: 확인 창
            const bg = document.getElementById('bgP').style.backgroundImage.slice(5, -2).replace(/"/g, "");
            const pf = document.getElementById('pfP').src;
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUser.userId,
                    nickname: document.getElementById('setNick').value,
                    profileDesc: document.getElementById('setDesc').value,
                    profileImg: pf, bgImg: bg
                })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('cafeUser', JSON.stringify(data.user));
                alert("성공적으로 저장되었습니다!"); location.reload();
            }
        }

        function openSettings() {
            if(!currentUser) return;
            document.getElementById('setNick').value = currentUser.nickname;
            document.getElementById('setDesc').value = currentUser.profileDesc || "";
            document.getElementById('bgP').style.backgroundImage = currentUser.bgImg ? `url(${currentUser.bgImg})` : '';
            document.getElementById('pfP').src = currentUser.profileImg || 'https://via.placeholder.com/70';
            
            // 6번 요청: 관리자 전용 탭 활성화
            if(currentUser.role === '주인장' || currentUser.role === '점원') {
                document.getElementById('adminTab').style.display = 'block';
                renderUserList();
            } else {
                document.getElementById('adminTab').style.display = 'none';
            }
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function renderUserList() {
            const area = document.getElementById('userListArea');
            area.innerHTML = allUsers.filter(u=>u.userId !== 'Mint_pocky').map(u => `
                <div style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #eee;">
                    <span>${u.nickname} <small style="color:#999;">(${u.role})</small></span>
                    <button class="btn" style="margin-left:auto; font-size:11px; background:#eee;" onclick="toggleStaff('${u.nickname}')">
                        ${cafeConfig.staffList.includes(u.nickname)?'점원 해제':'점원 임명'}
                    </button>
                </div>
            `).join('') || '<p style="padding:20px; text-align:center; color:#ccc;">유저가 없습니다.</p>';
        }

        function toggleStaff(nick) {
            if(currentUser.role !== '주인장') return alert("주인장만 가능합니다.");
            let list = [...cafeConfig.staffList];
            if(list.includes(nick)) list = list.filter(n=>n!==nick);
            else list.push(nick);
            socket.emit('update_config', { adminNick: currentUser.nickname, newConfig: { staffList: list } });
            alert("변경되었습니다.");
        }

        function showSTab(i, e) {
            document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.st-content').forEach(c=>c.style.display='none');
            e.classList.add('active'); 
            document.getElementById(`st-${i}`).style.display='block';
        }

        async function auth(t) {
            const res = await fetch(t==='login'?'/api/login':'/api/signup', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ userId:document.getElementById('uId').value, password:document.getElementById('uPw').value, nickname:document.getElementById('uNi').value })
            });
            const d = await res.json();
            if(d.success) {
                if(t==='login'){ localStorage.setItem('cafeUser', JSON.stringify(d.user)); location.reload(); }
                else alert("가입되었습니다. 로그인을 진행해주세요!");
            } else alert("정보가 틀리거나 이미 존재하는 아이디입니다.");
        }
        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function filterBoard(n, e) { 
            document.querySelectorAll('.board-item').forEach(i=>i.classList.remove('active')); 
            e.classList.add('active'); document.getElementById('currentBoardTitle').innerText=n; 
            closePost(); renderPosts(); 
        }
    </script>
</body>
</html>
