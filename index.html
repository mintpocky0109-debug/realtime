<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 추가 기능용 최소한의 스타일 */
        .s-tab { flex:1; text-align:center; padding:10px; cursor:pointer; color:#aaa; font-weight:bold; }
        .s-tab.active { color:#2db400; border-bottom:2px solid #2db400; }
        .st-content { display:none; }
        .st-content.active { display:block; }
        .bg-preview { width:100%; height:120px; border-radius:10px; background-color:#eee; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; }
        .prof-preview { width:70px; height:70px; border-radius:50%; border:3px solid white; margin-top:-35px; margin-left:15px; background:#fff; cursor:pointer; object-fit:cover; }
        .user-row { display:flex; align-items:center; padding:10px; border-bottom:1px solid #f5f5f5; }
        #toast { position:fixed; bottom:-50px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:30px; transition:0.3s; z-index:9999; }
        #toast.show { bottom:30px; }
    </style>
</head>
<body>
    <div id="toast">저장되었습니다!</div>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">카페</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideExtra" style="display:none; margin-top:20px;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 글쓰기</button>
                <div style="text-align:center; cursor:pointer; margin-top:15px; color:#888;" onclick="openSettings()">⚙️ 설정</div>
            </div>
        </nav>
        <section class="content">
            <div id="listView" style="padding:20px;">
                <h2 id="currentBoardTitle">전체보기</h2>
                <div id="postList"></div>
            </div>
            <div id="postDetailView" style="display:none; padding:20px;">
                <div onclick="closePost()" style="cursor:pointer; color:#888;">← 목록</div>
                <div id="postDetailBody"></div>
                <div id="commentArea">
                    <div id="commentList"></div>
                    <div id="commentInputArea" style="display:none; margin-top:10px;">
                        <input id="commentInput" type="text" placeholder="댓글..." class="input-style">
                        <button class="btn btn-green" onclick="submitComment()">등록</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:400px; border-radius:20px; padding:20px;">
            <div style="display:flex; border-bottom:1px solid #eee; margin-bottom:15px;">
                <div class="s-tab active" onclick="showSTab(0, this)">프로필</div>
                <div id="adminTab" class="s-tab" style="display:none;" onclick="showSTab(1, this)">점원관리</div>
            </div>
            <div id="st-0" class="st-content active">
                <div id="bgP" class="bg-preview" onclick="document.getElementById('bgF').click()">배경 사진</div>
                <img id="pfP" class="prof-preview" onclick="document.getElementById('pfF').click()">
                <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
                <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
                <input type="text" id="setNick" placeholder="닉네임" class="input-style" style="margin-top:10px;">
                <button class="btn btn-green" style="width:100%;" onclick="saveProfile()">저장</button>
            </div>
            <div id="st-1" class="st-content">
                <div id="userListArea"></div>
            </div>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:300px; border-radius:20px; padding:25px;">
            <input type="text" id="uId" placeholder="아이디" class="input-style">
            <input type="password" id="uPw" placeholder="비번" class="input-style">
            <input type="text" id="uNi" placeholder="닉네임(가입)" class="input-style">
            <button class="btn btn-green" style="width:100%;" onclick="auth('login')">로그인</button>
            <button class="btn" style="width:100%; margin-top:5px;" onclick="auth('signup')">가입</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let openedPostId = null;

        socket.on('load_all', d => { allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; renderAll(); });
        socket.on('update_posts', p => { allPosts = p; renderPosts(); if(openedPostId) renderPostDetail(openedPostId); });
        socket.on('update_config', c => { cafeConfig = c; renderAll(); });

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.getElementById('boardList').innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + cafeConfig.boards.map(b=>`<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            updateAuthUI(); renderPosts();
        }
        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                h.innerHTML = `<b>${currentUser.nickname}</b> (${currentUser.role}) <button class="btn" onclick="logout()">로그아웃</button>`;
                document.getElementById('sideExtra').style.display = 'block';
                document.getElementById('commentInputArea').style.display = 'flex';
            } else { h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`; }
        }
        function renderPosts() {
            const t = document.getElementById('currentBoardTitle').innerText;
            const f = t === "전체보기" ? allPosts : allPosts.filter(p=>p.board===t);
            document.getElementById('postList').innerHTML = f.slice().reverse().map(p=>`<div class="post-list-item" onclick="openPost(${p.id})"><div>${p.content.substring(0,30)}</div><small>${p.nickname} · 댓글 ${p.comments.length}</small></div>`).join('');
        }
        function openPost(id) { openedPostId = id; document.getElementById('listView').style.display='none'; document.getElementById('postDetailView').style.display='block'; renderPostDetail(id); }
        function closePost() { openedPostId = null; document.getElementById('listView').style.display='block'; document.getElementById('postDetailView').style.display='none'; }
        function renderPostDetail(id) {
            const p = allPosts.find(x=>x.id===id); if(!p) return;
            document.getElementById('postDetailBody').innerHTML = `<h2>${p.content.substring(0,20)}</h2><small>${p.nickname} · ${p.time}</small><hr><div style="white-space:pre-wrap; margin:15px 0;">${p.content}</div>${p.image?`<img src="${p.image}" style="max-width:100%;">`:''}`;
            document.getElementById('commentList').innerHTML = p.comments.map(c=>`<div><b>${c.nickname}</b>: ${c.content}</div>`).join('');
        }
        function openSettings() {
            if(!currentUser) return;
            document.getElementById('setNick').value = currentUser.nickname;
            if(currentUser.userId === 'Mint_pocky') { document.getElementById('adminTab').style.display='block'; renderUserList(); }
            document.getElementById('settingsModal').style.display='flex';
        }
        function showSTab(i, e) { document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.st-content').forEach(c=>c.classList.remove('active')); e.classList.add('active'); document.getElementById(`st-${i}`).classList.add('active'); }
        function pvImg(i, t) { const f = i.files[0]; if(f) { const r = new FileReader(); r.onload = e => { if(t==='bgP') { document.getElementById(t).style.backgroundImage=`url(${e.target.result})`; document.getElementById(t).innerText=''; } else document.getElementById(t).src=e.target.result; }; r.readAsDataURL(f); } }
        async function saveProfile() {
            const bg = document.getElementById('bgP').style.backgroundImage.slice(5,-2).replace(/"/g,"");
            const pf = document.getElementById('pfP').src;
            const res = await fetch('/api/update-profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId:currentUser.userId, nickname:document.getElementById('setNick').value, profileImg:pf, bgImg:bg }) });
            if((await res.json()).success) { showToast("저장 완료!"); setTimeout(()=>location.reload(), 1000); }
        }
        function renderUserList() {
            document.getElementById('userListArea').innerHTML = allUsers.filter(u=>u.userId!=='Mint_pocky').map(u => {
                const s = cafeConfig.staffList.includes(u.nickname);
                return `<div class="user-row"><span>${u.nickname}</span><button class="btn" style="margin-left:auto; background:${s?'#ffa502':'#eee'}" onclick="tkS('${u.nickname}')">${s?'해제':'임명'}</button></div>`;
            }).join('') || "유저 없음";
        }
        function tkS(n) {
            let l = [...cafeConfig.staffList];
            if(l.includes(n)) l = l.filter(x=>x!==n); else l.push(n);
            socket.emit('update_config', { adminNick: currentUser.nickname, newConfig: { staffList: l } });
            showToast("변경됨");
        }
        async function auth(t) {
            const res = await fetch(t==='login'?'/api/login':'/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId:document.getElementById('uId').value, password:document.getElementById('uPw').value, nickname:document.getElementById('uNi').value }) });
            const d = await res.json(); if(d.success) { if(t==='login'){ currentUser=d.user; localStorage.setItem('cafeUser', JSON.stringify(d.user)); location.reload(); } else alert("성공"); } else alert("오류");
        }
        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function filterBoard(n, e) { document.querySelectorAll('.board-item').forEach(i=>i.classList.remove('active')); e.classList.add('active'); document.getElementById('currentBoardTitle').innerText=n; closePost(); renderPosts(); }
        function submitComment() { const c = document.getElementById('commentInput').value; if(c && currentUser) { socket.emit('new_comment', { postId:openedPostId, nickname:currentUser.nickname, content:c }); document.getElementById('commentInput').value=""; } }
    </script>
</body>
</html>
