<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 id="cafeName" onclick="location.reload()">카페 에스프레소</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideMenu" style="margin-top:20px; border-top:1px solid #eee; display:none; padding-top:20px;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 글쓰기</button>
                <button class="btn" id="adminBtn" style="width:100%; margin-top:8px; display:none;" onclick="openSettings()">⚙️ 카페 설정</button>
                <button class="btn" id="memberBtn" style="width:100%; margin-top:8px;" onclick="openSettings()">👤 정보 수정</button>
            </div>
        </nav>
        
        <section class="content">
            <div id="listView">
                <h2 id="currentBoardTitle" style="padding:25px 25px 0 25px; margin:0;">전체보기</h2>
                <div id="postList"></div>
            </div>
            <div id="postDetailView" style="display:none; padding:30px;">
                <div onclick="closePost()" style="cursor:pointer; color:#888; margin-bottom:20px;">← 목록으로</div>
                <div id="postDetailBody"></div>
            </div>
        </section>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:400px; border-radius:20px; padding:25px;">
            <h3 id="setModalTitle">내 정보 수정</h3>
            <div id="bgP" style="width:100%; height:100px; background:#eee center/cover; border-radius:10px; cursor:pointer;" onclick="document.getElementById('bgF').click()"></div>
            <img id="pfP" style="width:60px; height:60px; border-radius:50%; border:3px solid white; margin-top:-30px; margin-left:15px; cursor:pointer;" onclick="document.getElementById('pfF').click()">
            <input type="file" id="bgF" style="display:none;" onchange="pvImg(this, 'bgP')">
            <input type="file" id="pfF" style="display:none;" onchange="pvImg(this, 'pfP')">
            <input type="text" id="setNick" placeholder="닉네임" class="input-style" style="margin-top:15px;">
            <textarea id="setDesc" placeholder="자기소개" class="input-style" style="height:70px;"></textarea>
            <button class="btn btn-green" style="width:100%; padding:12px;" onclick="saveProfile()">저장하기</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#eee;" onclick="document.getElementById('settingsModal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="profileModal" class="modal" onclick="this.style.display='none'">
        <div style="background:white; width:340px; border-radius:20px; overflow:hidden;" onclick="event.stopPropagation()">
            <div id="p-bg" style="height:100px; background:#ddd center/cover;"></div>
            <div style="padding:20px; text-align:center;">
                <img id="p-img" style="width:80px; height:80px; border-radius:50%; border:4px solid white; margin-top:-50px; background:white;">
                <h3 id="p-nick" style="margin:10px 0;"></h3>
                <p id="p-desc" style="color:#666; font-size:14px;"></p>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:320px; border-radius:20px; padding:30px;">
            <div style="display:flex; margin-bottom:20px; border-bottom:1px solid #eee;">
                <div id="lTabL" class="s-tab active" style="flex:1; text-align:center; padding-bottom:10px; cursor:pointer;" onclick="switchLTab('L')">로그인</div>
                <div id="lTabS" class="s-tab" style="flex:1; text-align:center; padding-bottom:10px; cursor:pointer;" onclick="switchLTab('S')">회원가입</div>
            </div>
            <input type="text" id="uId" placeholder="아이디" class="input-style">
            <input type="password" id="uPw" placeholder="비밀번호" class="input-style">
            <input type="text" id="uNi" placeholder="닉네임" class="input-style" style="display:none;">
            <button id="authBtn" class="btn btn-green" style="width:100%; padding:12px;" onclick="auth()">로그인</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#eee;" onclick="document.getElementById('loginModal').style.display='none'">닫기</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const DEFAULT_PF = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23DBDBDB'%3E%3Crect width='24' height='24' fill='%23F0F0F0'/%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let authMode = 'L';

        socket.on('load_all', d => { 
            allPosts = d.posts; cafeConfig = d.config; allUsers = d.users; 
            if(currentUser) {
                const latest = allUsers.find(u => u.userId === currentUser.userId);
                if(latest) { currentUser = latest; localStorage.setItem('cafeUser', JSON.stringify(latest)); }
            }
            renderAll(); 
        });

        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.getElementById('boardList').innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + 
                cafeConfig.boards.map(b=>`<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            updateAuthUI(); 
            renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                h.innerHTML = `<b onclick="showProfile('${currentUser.nickname}')" style="cursor:pointer; margin-right:10px;">${currentUser.nickname}님</b><button class="btn" onclick="logout()" style="padding:4px 8px; font-size:12px;">로그아웃</button>`;
                document.getElementById('sideMenu').style.display = 'block';
                // 주인장 권한에 따른 버튼 노출
                if(currentUser.role === '주인장') {
                    document.getElementById('adminBtn').style.display = 'block';
                    document.getElementById('memberBtn').style.display = 'none';
                } else {
                    document.getElementById('adminBtn').style.display = 'none';
                    document.getElementById('memberBtn').style.display = 'block';
                }
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="document.getElementById('loginModal').style.display='flex'">로그인</button>`;
                document.getElementById('sideMenu').style.display = 'none';
            }
        }

        function switchLTab(m) {
            authMode = m;
            document.getElementById('lTabL').classList.toggle('active', m==='L');
            document.getElementById('lTabS').classList.toggle('active', m==='S');
            document.getElementById('uNi').style.display = m === 'S' ? 'block' : 'none';
            document.getElementById('authBtn').innerText = m === 'L' ? '로그인' : '회원가입'; // 버튼 문구 변경
        }

        async function auth() {
            const userId = document.getElementById('uId').value.trim();
            const password = document.getElementById('uPw').value.trim();
            const nickname = document.getElementById('uNi').value.trim();
            
            const endpoint = authMode === 'L' ? '/api/login' : '/api/signup';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password, nickname })
            });
            const d = await res.json();
            
            if(d.success) {
                if(authMode === 'L') {
                    localStorage.setItem('cafeUser', JSON.stringify(d.user));
                    location.reload();
                } else {
                    alert("회원가입이 완료되었습니다! 로그인해주세요.");
                    switchLTab('L');
                }
            } else alert(d.message);
        }

        async function saveProfile() {
            if(!confirm("정보를 수정하시겠습니까?")) return;
            const bgDiv = document.getElementById('bgP').style.backgroundImage;
            const payload = {
                userId: currentUser.userId,
                nickname: document.getElementById('setNick').value.trim(),
                profileDesc: document.getElementById('setDesc').value,
                profileImg: document.getElementById('pfP').src,
                bgImg: bgDiv && bgDiv !== 'none' ? bgDiv.slice(5, -2).replace(/"/g, "") : ""
            };
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const d = await res.json();
            if(d.success) {
                localStorage.setItem('cafeUser', JSON.stringify(d.user));
                alert("저장되었습니다.");
                location.reload();
            } else alert(d.message);
        }

        function openSettings() {
            document.getElementById('setNick').value = currentUser.nickname;
            document.getElementById('setDesc').value = currentUser.profileDesc || "";
            document.getElementById('bgP').style.backgroundImage = currentUser.bgImg ? `url(${currentUser.bgImg})` : 'none';
            document.getElementById('pfP').src = currentUser.profileImg || DEFAULT_PF;
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function showProfile(nick) {
            let u = allUsers.find(x => x.nickname === nick);
            if(!u) return alert("유저 정보를 찾을 수 없습니다.");
            document.getElementById('p-bg').style.backgroundImage = u.bgImg ? `url(${u.bgImg})` : 'none';
            document.getElementById('p-img').src = u.profileImg || DEFAULT_PF;
            document.getElementById('p-nick').innerText = u.nickname + " (" + u.role + ")";
            document.getElementById('p-desc').innerText = u.profileDesc || "";
            document.getElementById('profileModal').style.display = 'flex';
        }

        function renderPosts() {
            document.getElementById('postList').innerHTML = allPosts.map(p => `
                <div class="post-list-item" onclick="openPost(${p.id})">
                    <div style="font-weight:bold;">${p.content.substring(0,30)}</div>
                    <small style="color:#2db400;">${p.nickname}</small>
                </div>
            `).join('') || '<p style="text-align:center; padding:20px; color:#ccc;">글이 없습니다.</p>';
        }

        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function pvImg(input, targetId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    if (targetId === 'bgP') document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`;
                    else document.getElementById(targetId).src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        function closePost() { document.getElementById('listView').style.display='block'; document.getElementById('postDetailView').style.display='none'; }
    </script>
</body>
</html>
