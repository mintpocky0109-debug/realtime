<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="adminIcon" class="settings-icon" onclick="toggleSettings()">⚙️</div>

    <div class="cafe-header">
        <h1 onclick="location.href='/'">🚀 우리들의 비밀 커뮤니티</h1>
    </div>

    <div class="notice-container" id="noticeBar" style="display:none;">
        <div class="notice-item">
            <span class="notice-badge">필독</span>
            <span id="latestNotice">최신 공지사항이 여기에 표시됩니다.</span>
        </div>
    </div>

    <div class="control-bar">
        <button class="btn-write" onclick="location.href='/write'">📝 글쓰기</button>
    </div>

    <div id="board"></div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0;">🛠️ 카페 관리 센터</h2>
            <div>
                <label>대상 유저 닉네임</label>
                <input id="targetNick" class="input-field" type="text" placeholder="정확한 닉네임 입력">
            </div>
            <div>
                <label>부여할 역할</label>
                <select id="roleSelect" class="input-field">
                    <option value="멤버">일반 멤버</option>
                    <option value="점원">☕ 점원 (부관리자)</option>
                    <option value="주인장">👑 주인장 (관리자 전용)</option>
                </select>
            </div>
            <p id="permHint" style="font-size:12px; color:#888;">* 점원은 '점원'을 임명할 수 없습니다.</p>
            <button onclick="applyRole()" style="background:var(--naver-green); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer;">권한 변경 적용</button>
            <button onclick="toggleSettings()" style="background:#555; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">관리창 닫기</button>
        </div>
    </div>

    <footer><p>© 2026 우리 커뮤니티. 주인장과 점원이 함께 운영합니다.</p></footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');
        const myNick = localStorage.getItem('userNickname') || "";
        let currentRoles = {};

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function applyRole() {
            const nick = document.getElementById('targetNick').value;
            const role = document.getElementById('roleSelect').value;
            socket.emit('change_role', { adminNick: myNick, targetNick: nick, newRole: role });
            toggleSettings();
        }

        socket.on('alert', msg => alert(msg));
        
        socket.on('load_history', (history) => {
            board.innerHTML = '';
            history.forEach(data => renderPost(data));
            updateNoticeBar(history);
        });

        socket.on('show_post', (data) => {
            renderPost(data);
            if(data.isNotice) updateNoticeBar([data]);
        });

        socket.on('update_role_list', roles => {
            currentRoles = roles;
            // 내 역할이 주인장이나 점원이면 설정 아이콘 노출
            const myRole = roles[myNick.split('#')[0]];
            if(myRole === '주인장' || myRole === '점원') {
                document.getElementById('adminIcon').style.display = 'block';
            }
        });

        function updateNoticeBar(history) {
            const lastNotice = [...history].reverse().find(p => p.isNotice);
            if(lastNotice) {
                document.getElementById('noticeBar').style.display = 'block';
                document.getElementById('latestNotice').innerText = lastNotice.content.substring(0, 50) + "...";
            }
        }

        function renderPost(data) {
            const post = document.createElement('div');
            post.className = 'post' + (data.isNotice ? ' notice-post' : '');
            const imgHtml = data.image ? `<img class="post-image" src="${data.image}">` : "";
            
            let badge = "";
            let color = "";
            if(data.role === '주인장') { badge = `<span class="badge-admin">👑 주인장</span>`; color = "color: #ffcc00;"; }
            else if(data.role === '점원') { badge = `<span class="badge-staff">☕ 점원</span>`; color = "color: #00ffcc;"; }

            post.innerHTML = `
                <div class="post-header">
                    <div><span class="post-nickname" style="${color}">${data.nickname}</span>${badge}</div>
                    <span style="font-size:12px; color:#888;">${data.time}</span>
                </div>
                <div class="post-content">${data.isNotice ? '<strong>[공지] </strong>' : ''}${data.content}</div>
                ${imgHtml}
            `;
            board.prepend(post);
        }
    </script>
</body>
</html>
