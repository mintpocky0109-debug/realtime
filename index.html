<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 카페</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 8px; background: #eee; border: 1px solid #ddd; }
        .settings-icon { cursor: pointer; font-size: 26px; margin-top: 20px; color: #888; display: inline-block; transition: 0.3s; }
        .settings-icon:hover { color: #333; transform: rotate(90deg); }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .badge-owner { background: #ff4757; color: white; }
        .badge-staff { background: #ffa502; color: white; }
        .badge-member { background: #eee; color: #666; }
        .comment-item { padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .reply-item { margin-left: 40px; margin-top: 10px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-left: 4px solid #2db400; }
        .reply-btn { font-size: 11px; color: #2db400; cursor: pointer; margin-left: 10px; font-weight: bold; }
        .bg-preview { width: 100%; height: 120px; border-radius: 15px; background-size: cover; background-position: center; background-color: #eee; }
        .prof-preview { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; margin-top: -40px; margin-left: 20px; object-fit: cover; background: #fff; }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="cafeName" style="cursor:pointer;" onclick="location.reload()">☕ 카페</h1>
        <div id="headerAuth"></div>
    </header>

    <div class="main-wrapper">
        <nav class="sidebar">
            <div id="boardList"></div>
            <div id="sideExtra" style="margin-top:20px; display:none;">
                <button class="btn btn-green" style="width:100%;" onclick="location.href='/write'">📝 글쓰기</button>
                <div class="settings-icon" onclick="openSettings()">⚙️</div>
            </div>
        </nav>

        <section class="content">
            <div id="listView" style="padding:30px;"><h2 id="currentBoardTitle">전체보기</h2><div id="postList"></div></div>
            <div id="postDetailView" style="display:none; padding:40px; background:white;">
                <div style="cursor:pointer; color:#888; margin-bottom:20px;" onclick="closePost()">← 목록으로</div>
                <div id="postDetailBody"></div>
                <div class="comment-section" style="margin-top:40px; border-top:1px solid #eee; pt:20px;">
                    <h4 id="commentCountTitle">댓글</h4>
                    <div id="commentList"></div>
                    <div id="commentInputArea" style="display:none; gap:10px; mt:20px;">
                        <input id="commentInput" type="text" placeholder="댓글 입력..." class="input-style" style="margin:0;">
                        <button class="btn btn-green" onclick="submitComment()">등록</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="settingsModal" class="modal">
        <div style="background:white; width:450px; border-radius:20px; padding:30px; max-height:85vh; overflow-y:auto;">
            <h3>설정</h3>
            <div id="setBgPreview" class="bg-preview"></div>
            <img id="setProfPreview" class="prof-preview">
            <input type="text" id="setProfInput" placeholder="프로필 이미지 URL" class="input-style">
            <input type="text" id="setBgInput" placeholder="배경 이미지 URL" class="input-style">
            <input type="text" id="setNickInput" placeholder="닉네임" class="input-style">
            <textarea id="setDescInput" placeholder="자기소개" class="input-style"></textarea>
            <button class="btn btn-green" style="width:100%;" onclick="saveMyProfile()">프로필 저장</button>
            <div id="adminSettings" style="display:none; margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
                <h4>카페 관리</h4>
                <input type="text" id="setCafeNameInput" placeholder="카페 이름" class="input-style">
                <div id="staffManageArea">
                    <input type="text" id="setStaffInput" placeholder="점원 닉네임 (쉼표 구분)" class="input-style">
                </div>
                <button class="btn" style="width:100%; background:orange; color:white;" onclick="saveCafeConfig()">카페 설정 저장</button>
            </div>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="closeSettings()">닫기</button>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div style="width:380px; background:white; border-radius:20px; overflow:hidden;">
            <div id="profViewBg" style="height:140px; background-size:cover; background-position:center; background-color: #ddd;"></div>
            <div style="padding:20px; text-align:center;">
                <img id="profViewImg" style="width:90px; height:90px; border-radius:50%; border:4px solid white; margin-top:-60px; object-fit:cover; background:#fff;">
                <h2 id="profViewNick" style="margin:10px 0 5px 0;"></h2>
                <div id="profViewRole" class="badge"></div>
                <p id="profViewDesc" style="color:#666; font-size:14px; margin-top:10px;"></p>
                <div id="profViewPosts" style="text-align:left; margin-top:20px; max-height:150px; overflow-y:auto;"></div>
                <button class="btn" style="width:100%; margin-top:15px;" onclick="document.getElementById('profileModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div style="background:white; width:300px; border-radius:20px; padding:25px;">
            <div style="display:flex; margin-bottom:15px; text-align:center; border-bottom:1px solid #eee;">
                <div id="tabL" style="flex:1; cursor:pointer; padding-bottom:10px; color:#2db400; font-weight:bold;" onclick="toggleAuthTab('login')">로그인</div>
                <div id="tabS" style="flex:1; cursor:pointer; padding-bottom:10px; color:#aaa;" onclick="toggleAuthTab('signup')">회원가입</div>
            </div>
            <input type="text" id="authId" placeholder="아이디" class="input-style">
            <input type="password" id="authPw" placeholder="비밀번호" class="input-style">
            <input type="text" id="authNick" placeholder="닉네임" class="input-style" style="display:none;">
            <button id="authBtn" class="btn btn-green" style="width:100%;" onclick="handleAuth()">로그인</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allPosts = [], cafeConfig = {}, allUsers = [], currentUser = JSON.parse(localStorage.getItem('cafeUser')) || null;
        let openedPostId = null, authMode = 'login';

        socket.on('load_all', data => { 
            cafeConfig = data.config; allPosts = data.posts; allUsers = data.users; 
            if(currentUser) {
                const me = allUsers.find(u => u.userId === currentUser.userId);
                if(me) { currentUser = me; localStorage.setItem('cafeUser', JSON.stringify(me)); }
            }
            renderAll(); 
        });
        socket.on('update_posts', p => { allPosts = p; renderPosts(); if(openedPostId) renderPostDetail(openedPostId); });
        socket.on('update_config', c => { cafeConfig = c; renderAll(); });

        function renderAll() {
            document.getElementById('cafeName').innerText = cafeConfig.cafeName;
            document.documentElement.style.setProperty('--naver-green', cafeConfig.themeColor);
            const list = document.getElementById('boardList');
            list.innerHTML = `<div class="board-item active" onclick="filterBoard('전체보기', this)">📋 전체보기</div>` + 
                cafeConfig.boards.map(b => `<div class="board-item" onclick="filterBoard('${b}', this)">📋 ${b}</div>`).join('');
            updateAuthUI(); renderPosts();
        }

        function updateAuthUI() {
            const h = document.getElementById('headerAuth');
            if(currentUser) {
                const bClass = currentUser.role === '주인장' ? 'badge-owner' : (currentUser.role === '점원' ? 'badge-staff' : 'badge-member');
                h.innerHTML = `
                    <img src="${currentUser.profileImg || ''}" class="profile-small" onerror="this.src='https://via.placeholder.com/32'">
                    <span class="user-nick-click" onclick="openProfile('${currentUser.nickname}')">${currentUser.nickname}님</span>
                    <span class="badge ${bClass}">${currentUser.role}</span>
                    <button class="btn" style="margin-left:10px;" onclick="logout()">로그아웃</button>
                `;
                document.getElementById('sideExtra').style.display = 'block';
                document.getElementById('commentInputArea').style.display = 'flex';
            } else {
                h.innerHTML = `<button class="btn btn-green" onclick="openLogin()">로그인 / 가입</button>`;
                document.getElementById('sideExtra').style.display = 'none';
            }
        }

        function renderPosts() {
            const list = document.getElementById('postList');
            const title = document.getElementById('currentBoardTitle').innerText;
            const filtered = (title === "전체보기") ? allPosts : allPosts.filter(p => p.board === title);
            list.innerHTML = filtered.slice().reverse().map(p => `
                <div class="post-list-item" onclick="openPost(${p.id})">
                    <div style="font-weight:bold;">${p.content.substring(0,35)}</div>
                    <div style="font-size:12px; color:#888; margin-top:8px;">
                        <img src="${p.profileImg || ''}" class="profile-small" onerror="this.src='https://via.placeholder.com/32'">
                        <span class="user-nick-click" onclick="event.stopPropagation(); openProfile('${p.nickname}')">${p.nickname}</span> · 댓글 ${countComments(p)}
                    </div>
                </div>
            `).join('');
        }

        function countComments(p) {
            let c = p.comments.length;
            p.comments.forEach(com => c += (com.replies ? com.replies.length : 0));
            return c;
        }

        function renderPostDetail(id) {
            const post = allPosts.find(p => p.id === id);
            if(!post) return;
            const bClass = post.role === '주인장' ? 'badge-owner' : (post.role === '점원' ? 'badge-staff' : 'badge-member');
            
            document.getElementById('postDetailBody').innerHTML = `
                <h2 style="margin-bottom:10px;">${post.content.substring(0,25)}...</h2>
                <div style="margin-bottom:20px; display:flex; align-items:center;">
                    <img src="${post.profileImg || ''}" class="profile-small" style="width:40px; height:40px;" onerror="this.src='https://via.placeholder.com/40'">
                    <div>
                        <div class="user-nick-click" onclick="openProfile('${post.nickname}')" style="font-weight:bold;">${post.nickname} <span class="badge ${bClass}">${post.role}</span></div>
                        <div style="color:#aaa; font-size:12px;">${post.time}</div>
                    </div>
                </div>
                <div style="font-size:16px; line-height:1.7; white-space:pre-wrap;">${post.content}</div>
                ${post.image ? `<img src="${post.image}" style="max-width:100%; margin-top:20px; border-radius:15px;">` : ""}
                <div style="text-align:center; margin-top:40px;">
                    <button class="btn" style="border:1px solid #ddd; background:#fff" onclick="toggleLike(${post.id})">☕ 커피 ${post.likedBy.length}</button>
                </div>
            `;

            let html = "";
            post.comments.forEach(com => {
                html += `
                    <div class="comment-item">
                        <div style="font-weight:bold; font-size:13px;">
                            <img src="${com.profileImg || ''}" class="profile-small" style="width:24px; height:24px;" onerror="this.src='https://via.placeholder.com/24'">
                            ${com.nickname} <span style="font-weight:normal; color:#aaa; margin-left:10px;">${com.time}</span>
                        </div>
                        <div style="margin:8px 0 8px 32px;">${com.content}</div>
                        <span class="reply-btn" onclick="toggleReplyInput(${com.id})">답글</span>
                        <div id="replyBox-${com.id}" style="display:none; margin-top:10px; gap:5px;">
                            <input type="text" id="replyIn-${com.id}" class="input-style" placeholder="답글..." style="margin:0; flex:1;">
                            <button class="btn btn-green" onclick="submitComment(${com.id})">등록</button>
                        </div>
                    </div>
                `;
                if(com.replies) com.replies.forEach(rep => {
                    html += `<div class="reply-item">
                        <div style="font-weight:bold; font-size:12px;">
                            <img src="${rep.profileImg || ''}" class="profile-small" style="width:20px; height:20px;" onerror="this.src='https://via.placeholder.com/20'">
                            ${rep.nickname} <span style="font-weight:normal; color:#aaa; margin-left:8px;">${rep.time}</span>
                        </div>
                        <div style="margin:5px 0 0 28px;">${rep.content}</div>
                    </div>`;
                });
            });
            document.getElementById('commentList').innerHTML = html || '<p style="text-align:center; color:#ccc;">댓글이 없습니다.</p>';
            document.getElementById('commentCountTitle').innerText = `댓글 ${countComments(post)}`;
        }

        function toggleReplyInput(id) {
            const el = document.getElementById(`replyBox-${id}`);
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
        }

        function submitComment(parentId = null) {
            const inputId = parentId ? `replyIn-${parentId}` : 'commentInput';
            const content = document.getElementById(inputId).value.trim();
            if(!content || !currentUser) return;
            socket.emit('new_comment', { postId: openedPostId, nickname: currentUser.nickname, content, parentId });
            document.getElementById(inputId).value = "";
        }

        function openSettings() {
            if(!currentUser) return;
            document.getElementById('setBgPreview').style.backgroundImage = `url(${currentUser.bgImg})`;
            document.getElementById('setProfPreview').src = currentUser.profileImg || 'https://via.placeholder.com/80';
            document.getElementById('setBgInput').value = currentUser.bgImg || "";
            document.getElementById('setProfInput').value = currentUser.profileImg || "";
            document.getElementById('setNickInput').value = currentUser.nickname;
            document.getElementById('setDescInput').value = currentUser.profileDesc || "";
            if(currentUser.role === '주인장' || currentUser.role === '점원') {
                document.getElementById('adminSettings').style.display = 'block';
                document.getElementById('setCafeNameInput').value = cafeConfig.cafeName;
                document.getElementById('setStaffInput').value = cafeConfig.staffList.join(', ');
                document.getElementById('staffManageArea').style.display = (currentUser.role === '주인장') ? 'block' : 'none';
            }
            document.getElementById('settingsModal').style.display = 'flex';
        }

        async function saveMyProfile() {
            const upd = { userId: currentUser.userId, nickname: document.getElementById('setNickInput').value, profileImg: document.getElementById('setProfInput').value, profileDesc: document.getElementById('setDescInput').value, bgImg: document.getElementById('setBgInput').value };
            const res = await fetch('/api/update-profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(upd) });
            if((await res.json()).success) { alert("저장됨!"); location.reload(); }
        }

        function saveCafeConfig() {
            const newConfig = { cafeName: document.getElementById('setCafeNameInput').value };
            if(currentUser.role === '주인장') newConfig.staffList = document.getElementById('setStaffInput').value.split(',').map(s => s.trim()).filter(s => s);
            socket.emit('update_config', { adminNick: currentUser.nickname, newConfig });
            alert("카페 설정됨!");
        }

        function openProfile(nick) {
            const u = allUsers.find(user => user.nickname === nick);
            if(!u) return;
            document.getElementById('profViewBg').style.backgroundImage = `url(${u.bgImg || ''})`;
            document.getElementById('profViewImg').src = u.profileImg || 'https://via.placeholder.com/90';
            document.getElementById('profViewNick').innerText = u.nickname;
            document.getElementById('profViewRole').innerText = u.role;
            document.getElementById('profViewDesc').innerText = u.profileDesc || "소개가 없습니다.";
            const posts = allPosts.filter(p => p.nickname === nick);
            document.getElementById('profViewPosts').innerHTML = posts.map(p => `<div onclick="closeProfile(); openPost(${p.id})" style="padding:8px; border-bottom:1px solid #eee; cursor:pointer; font-size:13px;">• ${p.content.substring(0,20)}...</div>`).join('');
            document.getElementById('profileModal').style.display = 'flex';
        }

        async function handleAuth() {
            const userId = document.getElementById('authId').value, password = document.getElementById('authPw').value, nickname = document.getElementById('authNick').value;
            const url = authMode === 'login' ? '/api/login' : '/api/signup';
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, password, nickname }) });
            const data = await res.json();
            if(data.success) { if(authMode === 'login') { currentUser = data.user; localStorage.setItem('cafeUser', JSON.stringify(currentUser)); location.reload(); } else { alert("가입됨! 로그인하세요."); toggleAuthTab('login'); } }
            else alert(data.msg);
        }

        function toggleAuthTab(m) {
            authMode = m;
            document.getElementById('tabL').style.color = m === 'login' ? '#2db400' : '#aaa';
            document.getElementById('tabS').style.color = m === 'signup' ? '#2db400' : '#aaa';
            document.getElementById('authNick').style.display = m === 'signup' ? 'block' : 'none';
            document.getElementById('authBtn').innerText = m === 'login' ? '로그인' : '회원가입';
        }

        function filterBoard(n, el) { document.querySelectorAll('.board-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); document.getElementById('currentBoardTitle').innerText = n; closePost(); renderPosts(); }
        function openPost(id) { openedPostId = id; document.getElementById('listView').style.display = 'none'; document.getElementById('postDetailView').style.display = 'block'; renderPostDetail(id); window.scrollTo(0,0); }
        function closePost() { openedPostId = null; document.getElementById('listView').style.display = 'block'; document.getElementById('postDetailView').style.display = 'none'; }
        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function logout() { localStorage.removeItem('cafeUser'); location.reload(); }
        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function toggleLike(postId) { if(!currentUser) return alert("로그인 필요"); socket.emit('like_post', { postId, nickname: currentUser.nickname }); }
    </script>
</body>
</html>
