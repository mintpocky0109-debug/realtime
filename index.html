<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>🚀 실시간 커뮤니티</h2>
    </header>

    <button class="btn-write" onclick="location.href='/write'">+ 새 게시글 작성</button>

    <div id="board"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const board = document.getElementById('board');

        socket.on('load_history', (history) => {
            board.innerHTML = '';
            history.forEach(data => renderPost(data));
        });

        socket.on('show_post', (data) => {
            renderPost(data);
        });

        function renderPost(data) {
            const post = document.createElement('div');
            post.className = 'post';
            const imgHtml = data.image ? `<img class="post-image" src="${data.image}">` : "";
            
            post.innerHTML = `
                <div class="post-header">
                    <span class="post-nickname">${data.nickname}</span>
                    <span class="post-time">${data.time}</span>
                </div>
                <div class="post-content">${data.content}</div>
                ${imgHtml}
            `;
            board.prepend(post);
        }
    </script>
</body>
</html>
