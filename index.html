<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커뮤니티</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json"> 
</head>
<body>
    <div class="settings-icon" onclick="openSettings()">⚙️</div>

    <header class="cafe-header" style="padding: 20px; text-align: center;">
        <h1 id="cafeTitle">🚀 로딩 중...</h1>
    </header>

    <div style="padding: 0 15px 15px; display: flex; justify-content: flex-end;">
        <button class="btn btn-main" onclick="location.href='/write'">📝 글쓰기</button>
    </div>

    <div id="board" style="max-width: 800px; margin: 0 auto; width: 100%;"></div>

    <div id="settingsModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal-content">
            <div class="modal-sidebar" style="width:200px; background:#1e1f22; display:flex; flex-direction:column; padding:15px; gap:10px;">
                <div onclick="showMenu('info')" style="cursor:pointer;">🏠 정보</div>
                <div onclick="showMenu('design')" style="cursor:pointer;">🎨 디자인</div>
                <div onclick="showMenu('admin')" style="cursor:pointer;">🛡️ 관리</div>
                <div onclick="closeSettings()" style="margin-top:auto; color:red; cursor:pointer;">❌ 닫기</div>
            </div>
            <div class="modal-body" id="menu-info" style="flex:1; padding:30px;">
                <h2>내 권한 정보</h2>
                <div id="myRoleInfo">확인 중...</div>
            </div>
            <div class="modal-body" id="menu-design" style="flex:1; padding:30px; display:none;">
                <h2>디자인 커스텀</h2>
                <label>테마 색상</label>
                <input type="color" id="themePick" style="width:100%; height:40px;">
                <button onclick="saveSettings()" class="btn btn-main" style="margin-top:15px;">저장</button>
            </div>
            <div class="modal-body" id="menu-admin" style="flex:1; padding:30px; display:none;">
                <h2>전체 삭제</h2>
                <button onclick="socket.emit('clear_all', myNick)" style="background:red; color:white;" class="btn">모든 글 지우기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myNick = localStorage.getItem('userNickname') || "";

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function showMenu(m) {
            document.querySelectorAll('.modal-body').forEach(b => b.style.display='none');
            document.getElementById('menu-'+m).style.display='block';
        }

        socket.on('update_config', c => {
            document.getElementById('cafeTitle').innerText = c.cafeName;
            document.documentElement.style.setProperty('--naver-green', c.themeColor);
            document.documentElement.style.setProperty('--bg-main', c.bgColor);
        });

        socket.on('load_history', h => {
            const board = document.getElementById('board');
            board.innerHTML = '';
            h.reverse().forEach(d => {
                const p = document.createElement('div');
                p.className = 'post';
                p.style.cssText = "background:var(--bg-card); margin-bottom:10px; padding:20px; border-radius:12px;";
                const img = d.image ? `<img src="${d.image}" style="width:100%; border-radius:8px; margin-top:10px;">` : "";
                p.innerHTML = `<b>${d.nickname}</b> <small style="color:#888;">${d.time}</small><br><div style="margin-top:8px;">${d.content}</div>${img}`;
                board.appendChild(p);
            });
        });

        function saveSettings() {
            const color = document.getElementById('themePick').value;
            socket.emit('update_cafe_settings', { adminNick: myNick, settings: { themeColor: color } });
        }
    </script>
</body>
</html>
