<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내 전용 커뮤니티</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings-icon" onclick="openSettings()">⚙️</div>

    <header class="cafe-header">
        <div class="container">
            <h1 id="cafeTitle">🚀 로딩 중...</h1>
        </div>
    </header>

    <main class="container">
        <div style="margin-bottom: 15px; display: flex; justify-content: flex-end;">
            <button class="btn btn-main" onclick="location.href='/write'">📝 글쓰기</button>
        </div>

        <div id="board"></div>
    </main>

    <div id="settingsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding: 20px;">
        <div style="background:white; border-radius:15px; width:100%; max-width:500px; overflow:hidden; display:flex; flex-direction:column;">
            <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <strong>카페 설정</strong>
                <span onclick="closeSettings()" style="cursor:pointer;">✕</span>
            </div>
            <div style="padding:20px;">
                <label>테마 색상 변경</label>
                <input type="color" id="themePick" style="width:100%; height:40px; margin:10px 0;">
                <button onclick="saveSettings()" class="btn btn-main" style="width:100%;">저장하기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myNick = localStorage.getItem('userNickname') || "";

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        socket.on('update_config', c => {
            document.getElementById('cafeTitle').innerText = c.cafeName;
            document.documentElement.style.setProperty('--naver-green', c.themeColor);
        });

        socket.on('load_history', h => {
            const board = document.getElementById('board');
            board.innerHTML = '';
            [...h].reverse().forEach(d => {
                const p = document.createElement('div');
                p.className = 'post';
                
                const roleBadge = d.role === "주인장" ? `<span style="color:var(--naver-green); border:1px solid var(--naver-green); padding:1px 4px; border-radius:3px; font-size:11px; margin-right:5px;">주인장</span>` : "";
                const img = d.image ? `<img src="${d.image}" class="post-image">` : "";
                
                p.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">${roleBadge}${d.nickname}</div>
                        <div class="post-time">${d.time}</div>
                    </div>
                    <div class="post-content">${d.content}</div>
                    ${img}
                `;
                board.appendChild(p);
            });
        });

        function saveSettings() {
            const color = document.getElementById('themePick').value;
            socket.emit('update_cafe_settings', { adminNick: myNick, settings: { themeColor: color } });
            closeSettings();
        }
    </script>
</body>
</html>
